<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLA 语义本体构建工具</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* ===== THEME VARIABLES ===== */
:root, [data-theme="light"] {
  --bg-body: linear-gradient(180deg, #eef4fb 0%, #f8fbff 42%, #eef3f8 100%);
  --bg-panel: rgba(255,255,255,0.86);
  --bg-panel-strong: rgba(255,255,255,0.96);
  --bg-canvas: #f7fbff;
  --bg-canvas-dot: rgba(148,163,184,0.22);
  --bg-input: rgba(255,255,255,0.92);
  --bg-hover: rgba(15,23,42,0.045);
  --bg-soft: rgba(248,250,252,0.82);
  --bg-node-glass: rgba(255,255,255,0.82);
  --border-main: rgba(203,213,225,0.82);
  --border-subtle: rgba(226,232,240,0.7);
  --border-input: rgba(148,163,184,0.45);
  --text-primary: #0f172a;
  --text-secondary: #334155;
  --text-muted: #64748b;
  --text-faint: #94a3b8;
  --text-ghost: #cbd5e1;
  --scroll-thumb: #cbd5e1;
  --scroll-hover: #94a3b8;
  --node-shadow: none;
  --node-hover-shadow: none;
  --node-selected-shadow: none;
  --panel-shadow: 0 12px 36px rgba(15,23,42,0.08);
  --header-shadow: 0 8px 24px rgba(15,23,42,0.06);
  --modal-overlay: rgba(15,23,42,0.22);
  --modal-bg: rgba(255,255,255,0.98);
  --modal-border: rgba(226,232,240,0.9);
  --tag-obj-bg: rgba(59,130,246,0.1);  --tag-obj-text: #2563eb;
  --tag-link-bg: rgba(16,185,129,0.1); --tag-link-text: #059669;
  --tag-act-bg: rgba(245,158,11,0.12);  --tag-act-text: #d97706;
  --tag-rule-bg: rgba(239,68,68,0.12); --tag-rule-text: #dc2626;
  --node-obj-bg: rgba(219,234,254,0.92);  --node-obj-border: rgba(59,130,246,0.2);
  --node-link-bg: rgba(209,250,229,0.88); --node-link-border: rgba(16,185,129,0.22);
  --node-act-bg: rgba(255,247,220,0.95);  --node-act-border: rgba(245,158,11,0.22);
  --node-rule-bg: rgba(254,242,242,0.96); --node-rule-border: rgba(239,68,68,0.24);
  --obj-name: #1d4ed8; --link-name: #047857; --act-name: #b45309; --rule-name: #b91c1c;
  --obj-prop-dot: rgba(59,130,246,0.5); --act-prop-dot: rgba(245,158,11,0.5); --rule-prop-dot: rgba(239,68,68,0.5);
  --conn-label-bg: rgba(255,255,255,0.0); --conn-label-border: rgba(51,65,85,0.0); --conn-label-text: #64748b;
  --conn-label-bg-sel: rgba(255,255,255,0.0); --conn-label-text-sel: #334155;
  --edge-stroke: #9aaabd; --edge-stroke-selected: #3b82f6;
  --ai-user-bg: #dbeafe; --ai-user-text: #1e40af;
  --ai-assist-bg: rgba(248,250,252,0.92); --ai-assist-text: #334155; --ai-assist-border: rgba(226,232,240,0.9);
  --ai-sys-bg: rgba(245,158,11,0.08); --ai-sys-text: #b45309; --ai-sys-border: rgba(245,158,11,0.2);
  --table-header-bg: rgba(248,250,252,0.95); --table-border: rgba(226,232,240,0.9); --table-hover: rgba(15,23,42,0.025);
  --btn-ghost-bg: rgba(255,255,255,0.68); --btn-ghost-text: #64748b; --btn-ghost-border: rgba(203,213,225,0.7);
  --btn-ghost-hover: rgba(255,255,255,0.96);
  --search-hl-bg: rgba(250,204,21,0.18); --search-hl-border: rgba(250,204,21,0.45);
  --port-bg: #94a3b8; --port-border: #ffffff;
  --zoom-bg: rgba(255,255,255,0.88); --zoom-border: rgba(203,213,225,0.85); --zoom-text: #64748b; --zoom-hover: rgba(255,255,255,0.98);
  --tree-active-bg: rgba(59,130,246,0.1); --tree-active-text: #2563eb;
  --tree-section-bg: rgba(248,250,252,0.78);
  --tab-active-text: #0f172a; --tab-text: #94a3b8;
  --view-toggle-bg: rgba(241,245,249,0.92);
  --cardinality-text: rgba(16,185,129,0.4);
  --instance-badge: rgba(59,130,246,0.4);
  --link-hint-bg: rgba(15,23,42,0.82);
  --empty-icon-opacity: 0.2;
  --sidebar-toggle-bg: rgba(255,255,255,0.76);
  --sidebar-toggle-hover: rgba(255,255,255,0.96);
}

[data-theme="dark"] {
  --bg-body: linear-gradient(180deg, #07101d 0%, #0a1424 42%, #0d1729 100%);
  --bg-panel: rgba(13,19,32,0.78);
  --bg-panel-strong: rgba(15,23,42,0.92);
  --bg-canvas: #0d1526;
  --bg-canvas-dot: rgba(71,85,105,0.28);
  --bg-input: rgba(15,23,42,0.82);
  --bg-hover: rgba(255,255,255,0.06);
  --bg-soft: rgba(15,23,42,0.72);
  --bg-node-glass: rgba(15,23,42,0.72);
  --border-main: rgba(51,65,85,0.9);
  --border-subtle: rgba(30,41,59,0.9);
  --border-input: rgba(71,85,105,0.9);
  --text-primary: #e2e8f0;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --text-faint: #64748b;
  --text-ghost: #475569;
  --scroll-thumb: #334155;
  --scroll-hover: #475569;
  --node-shadow: 0 12px 34px rgba(0,0,0,0.32), 0 2px 10px rgba(0,0,0,0.24);
  --node-hover-shadow: 0 18px 44px rgba(0,0,0,0.42), 0 8px 16px rgba(0,0,0,0.28);
  --node-selected-shadow: 0 0 0 2px rgba(96,165,250,0.9), 0 18px 38px rgba(96,165,250,0.22);
  --panel-shadow: 0 12px 36px rgba(0,0,0,0.28);
  --header-shadow: 0 8px 24px rgba(0,0,0,0.24);
  --modal-overlay: rgba(2,6,23,0.68);
  --modal-bg: rgba(15,23,42,0.96);
  --modal-border: rgba(51,65,85,0.95);
  --tag-obj-bg: rgba(59,130,246,0.2);  --tag-obj-text: #93c5fd;
  --tag-link-bg: rgba(16,185,129,0.2); --tag-link-text: #6ee7b7;
  --tag-act-bg: rgba(245,158,11,0.2);  --tag-act-text: #fcd34d;
  --tag-rule-bg: rgba(239,68,68,0.2); --tag-rule-text: #fca5a5;
  --node-obj-bg: rgba(29,78,216,0.22);  --node-obj-border: rgba(96,165,250,0.25);
  --node-link-bg: rgba(4,120,87,0.22); --node-link-border: rgba(52,211,153,0.22);
  --node-act-bg: rgba(180,83,9,0.2);  --node-act-border: rgba(251,191,36,0.22);
  --node-rule-bg: rgba(127,29,29,0.26); --node-rule-border: rgba(248,113,113,0.28);
  --obj-name: #bfdbfe; --link-name: #a7f3d0; --act-name: #fde68a; --rule-name: #fecaca;
  --obj-prop-dot: rgba(59,130,246,0.6); --act-prop-dot: rgba(245,158,11,0.6); --rule-prop-dot: rgba(248,113,113,0.6);
  --conn-label-bg: rgba(255,255,255,0.0); --conn-label-border: rgba(148,163,184,0.0); --conn-label-text: #aebfd2;
  --conn-label-bg-sel: rgba(255,255,255,0.0); --conn-label-text-sel: #e2efff;
  --edge-stroke: #8da0b5; --edge-stroke-selected: #60a5fa;
  --ai-user-bg: #17365a; --ai-user-text: #dbeafe;
  --ai-assist-bg: rgba(15,23,42,0.92); --ai-assist-text: #cbd5e1; --ai-assist-border: rgba(51,65,85,0.95);
  --ai-sys-bg: rgba(245,158,11,0.1); --ai-sys-text: #fbbf24; --ai-sys-border: rgba(245,158,11,0.2);
  --table-header-bg: rgba(15,23,42,0.95); --table-border: rgba(51,65,85,0.9); --table-hover: rgba(255,255,255,0.03);
  --btn-ghost-bg: rgba(255,255,255,0.05); --btn-ghost-text: #94a3b8; --btn-ghost-border: rgba(255,255,255,0.08);
  --btn-ghost-hover: rgba(255,255,255,0.1);
  --search-hl-bg: rgba(250,204,21,0.2); --search-hl-border: rgba(250,204,21,0.42);
  --port-bg: #64748b; --port-border: #0f172a;
  --zoom-bg: rgba(15,23,42,0.82); --zoom-border: rgba(51,65,85,0.9); --zoom-text: #94a3b8; --zoom-hover: rgba(30,41,59,0.98);
  --tree-active-bg: rgba(59,130,246,0.16); --tree-active-text: #93c5fd;
  --tree-section-bg: rgba(15,23,42,0.7);
  --tab-active-text: #e2e8f0; --tab-text: #64748b;
  --view-toggle-bg: rgba(30,41,59,0.9);
  --cardinality-text: rgba(74,222,128,0.38);
  --instance-badge: rgba(59,130,246,0.5);
  --link-hint-bg: rgba(15,23,42,0.9);
  --empty-icon-opacity: 0.3;
  --sidebar-toggle-bg: rgba(15,23,42,0.72);
  --sidebar-toggle-hover: rgba(30,41,59,0.96);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-body);color:var(--text-primary);overflow:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-hover)}

#app-shell{padding:14px;gap:12px;background:transparent}
.panel-glass{background:var(--bg-panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-main);box-shadow:var(--panel-shadow)}

#canvas-viewport{width:100%;height:100%;overflow:hidden;position:relative;background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0)), var(--bg-canvas);transition:background .3s;border-radius:22px}
#canvas-world{position:absolute;width:24000px;height:24000px;transform-origin:0 0;overflow:visible;
  background-image:radial-gradient(circle,var(--bg-canvas-dot) 1px,transparent 1px);background-size:28px 28px}
#connections-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:5}
#nodes-container{position:absolute;inset:0}

.canvas-node{position:absolute;cursor:grab;user-select:none;font-size:13px;transition:background .2s,border-color .2s,transform .12s;backdrop-filter:none;
  border:1px solid var(--border-main);box-shadow:none;white-space:normal;width:auto;display:inline-flex;align-items:center;justify-content:center}
.canvas-node:active{cursor:grabbing}
.canvas-node.selected{box-shadow:none!important;transform:none}
.canvas-node.hovered{transform:none}
.canvas-node:hover{box-shadow:none;transform:none}

.node-object{border-radius:9999px!important;min-width:52px;min-height:52px;padding:0;aspect-ratio:1/1;overflow:hidden}
.node-action{border-radius:14px;padding:0 6px;min-height:30px;max-width:132px}
.node-rule{border-radius:10px;padding:0 6px;min-height:28px;max-width:132px}

.node-title{display:flex;align-items:center;justify-content:center;gap:0;padding:1px 0;font-weight:400;font-size:12px;line-height:1.03;min-width:0;letter-spacing:0;text-align:center;white-space:normal;word-break:break-word;overflow-wrap:anywhere;transition:font-weight .12s,color .12s}
.node-object .node-title{padding:0!important;line-height:1.02}
.canvas-node.hovered .node-title{font-weight:700;filter:saturate(1.08)}
.canvas-node.selected .node-title{font-weight:700;filter:saturate(1.12)}

#canvas-viewport.force-on .node-object{min-width:40px;min-height:40px;padding:0!important}
#canvas-viewport.force-on .node-action{padding:0 2px;min-height:24px;max-width:108px}
#canvas-viewport.force-on .node-rule{padding:0 2px;min-height:23px;max-width:108px}
#canvas-viewport.force-on .node-title{font-size:15.5px;line-height:0.98;padding:0}
#canvas-viewport.force-on .node-object .node-title{font-size:15.5px!important;padding:0!important;line-height:1.0}
#canvas-viewport.force-on .node-action .node-title,#canvas-viewport.force-on .node-rule .node-title{padding:5px 7px!important}

.node-port{width:12px;height:12px;border-radius:50%;position:absolute;background:var(--port-bg);border:2px solid var(--port-border);cursor:crosshair;transition:all .15s;z-index:10;opacity:0}
.canvas-node:hover .node-port{opacity:1}
.node-port:hover{background:#3b82f6;transform:scale(1.5);opacity:1!important}
.port-top{top:-6px;left:calc(50% - 6px)}.port-right{right:-6px;top:calc(50% - 6px)}
.port-bottom{bottom:-6px;left:calc(50% - 6px)}.port-left{left:-6px;top:calc(50% - 6px)}
.port-top-left{top:11%;left:11%}
.port-top-right{top:11%;right:11%}
.port-bottom-right{bottom:11%;right:11%}
.port-bottom-left{bottom:11%;left:11%}

.conn-path{fill:none;stroke:var(--edge-stroke);stroke-width:1.15;stroke-linecap:round;transition:stroke .15s,stroke-width .15s}
.conn-hit{fill:none;stroke:transparent;stroke-width:14;cursor:pointer}
.conn-hit:hover+.conn-path{stroke-width:1.8}
.conn-label{font-size:11px;fill:var(--conn-label-text);pointer-events:none;font-weight:400;letter-spacing:.01em;paint-order:stroke;stroke:var(--bg-canvas);stroke-width:4px;stroke-linejoin:round}

.modal-overlay{position:fixed;inset:0;background:var(--modal-overlay);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;padding:20px}
.modal-box{background:var(--modal-bg);border:1px solid var(--modal-border);border-radius:24px;padding:28px;min-width:520px;max-width:700px;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease;color:var(--text-primary);transition:background .3s,border-color .3s;box-shadow:0 28px 80px rgba(15,23,42,0.18)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

.btn{padding:8px 14px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;box-shadow:0 8px 18px rgba(59,130,246,0.24)}.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.02)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}.btn-success:hover{transform:translateY(-1px)}
.btn-warn{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#111827}.btn-warn:hover{transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}.btn-danger:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--btn-ghost-bg);color:var(--btn-ghost-text);border:1px solid var(--btn-ghost-border);backdrop-filter:blur(12px)}
.btn-ghost:hover{background:var(--btn-ghost-hover);color:var(--text-primary);transform:translateY(-1px)}

.input{background:var(--bg-input);border:1px solid var(--border-input);border-radius:14px;padding:10px 13px;color:var(--text-primary);font-size:13px;width:100%;outline:none;transition:border .15s,background .3s,color .3s,box-shadow .15s}
.input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.1)}
.input::placeholder{color:var(--text-faint)}

.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.04em}
.search-highlight{background:var(--search-hl-bg)!important;border-color:var(--search-hl-border)!important}

.tab-btn{padding:12px 16px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--tab-text);border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--tab-active-text);border-bottom-color:#3b82f6}
.tab-btn:hover{color:var(--text-secondary)}

.temp-line{stroke:#3b82f6;stroke-width:1.8;stroke-dasharray:6 4;fill:none;pointer-events:none}

.zoom-ctrl{position:absolute;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:20}
.zoom-btn{width:40px;height:40px;border-radius:14px;background:var(--zoom-bg);border:1px solid var(--zoom-border);color:var(--zoom-text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 8px 18px rgba(15,23,42,0.08)}
.zoom-btn:hover{background:var(--zoom-hover);color:var(--text-primary);transform:translateY(-1px)}

.tree-item{padding:6px 8px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;line-height:1.15;min-height:30px;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent}
.tree-item:hover{background:var(--bg-hover);border-color:var(--border-subtle)}
.tree-item.active{background:var(--tree-active-bg);color:var(--tree-active-text);border-color:rgba(59,130,246,0.18)}
.group-dot{width:10px;height:10px;border-radius:999px;display:inline-block;flex-shrink:0;border:1px solid rgba(255,255,255,0.78);box-shadow:0 0 0 1px rgba(15,23,42,0.06)}
.group-swatch{width:18px;height:18px;border-radius:999px;border:1px solid var(--border-main);display:inline-block;flex-shrink:0}

.ai-msg{padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.38;max-width:85%;animation:slideUp .2s}
.ai-msg.user{background:var(--ai-user-bg);color:var(--ai-user-text);margin-left:auto;border-bottom-right-radius:4px}
.ai-msg.assistant{background:var(--ai-assist-bg);color:var(--ai-assist-text);border:1px solid var(--ai-assist-border);border-bottom-left-radius:4px}
.ai-msg.system{background:var(--ai-sys-bg);color:var(--ai-sys-text);font-size:12px;line-height:1.32;border:1px solid var(--ai-sys-border)}
 
 table.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
table.data-table th{text-align:left;padding:10px 12px;background:var(--table-header-bg);color:var(--text-muted);font-weight:700;border-bottom:1px solid var(--table-border);position:sticky;top:0}
table.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary)}
table.data-table tr:hover td{background:var(--table-hover)}

.obj-color{background:var(--node-obj-bg);border-color:var(--node-obj-border)}
.link-color{background:var(--node-link-bg);border-color:var(--node-link-border)}
.act-color{background:var(--node-act-bg);border-color:var(--node-act-border)}
.rule-color{background:var(--node-rule-bg);border-color:var(--node-rule-border)}
.badge-obj{background:var(--tag-obj-bg);color:var(--tag-obj-text)}
.badge-link{background:var(--tag-link-bg);color:var(--tag-link-text)}
.badge-act{background:var(--tag-act-bg);color:var(--tag-act-text)}
.badge-rule{background:var(--tag-rule-bg);color:var(--tag-rule-text)}
.arrow-marker{fill:var(--edge-stroke)}

/* Theme toggle button */
.theme-toggle{width:40px;height:40px;border-radius:14px;border:1px solid var(--border-main);background:var(--btn-ghost-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;overflow:hidden;backdrop-filter:blur(12px)}
.theme-toggle:hover{background:var(--btn-ghost-hover);border-color:var(--border-input);transform:translateY(-1px)}
.theme-toggle .icon-sun,.theme-toggle .icon-moon{position:absolute;transition:transform .4s ease,opacity .3s ease}
[data-theme="light"] .theme-toggle .icon-sun{transform:rotate(0deg);opacity:1}
[data-theme="light"] .theme-toggle .icon-moon{transform:rotate(-90deg);opacity:0}
[data-theme="dark"] .theme-toggle .icon-sun{transform:rotate(90deg);opacity:0}
[data-theme="dark"] .theme-toggle .icon-moon{transform:rotate(0deg);opacity:1}

/* Top operation menu */
#ops-menu-btn{height:40px;padding:0 14px;border-radius:14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text-secondary)}
#ops-menu-btn svg{opacity:.82}
#ops-menu{min-width:238px;padding:8px!important;border-radius:18px!important;background:var(--bg-panel-strong)!important;border:1px solid var(--border-main)!important;box-shadow:var(--shadow-panel)!important}
.ops-menu-item{width:100%;text-align:left;padding:11px 12px;border-radius:12px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--text-secondary);transition:background .16s ease,color .16s ease,transform .16s ease}
.ops-menu-item svg{width:16px;height:16px;opacity:.8;flex:0 0 auto}
.ops-menu-item:hover{background:var(--bg-hover);color:var(--text-primary);transform:translateX(1px)}
.ops-menu-sep{height:1px;margin:6px 4px;background:var(--border-subtle)}

/* Smooth transitions for theme switch */
header,aside,.sidebar-panel,#ai-panel,#left-sidebar,#right-panel{transition:background .3s,border-color .3s,color .3s,box-shadow .3s}

/* AI side panel (left, replaces old sidebar) */
#ai-panel{transition:width .28s cubic-bezier(.4,0,.2,1),min-width .28s ease;overflow:hidden;display:flex;flex-direction:column}
#ai-panel.collapsed{width:48px!important;min-width:48px!important}
#ai-panel.collapsed #ai-body,#ai-panel.collapsed #ai-title-text,#ai-panel.collapsed #ai-status{display:none!important}
#ai-panel.collapsed #ai-header{flex-direction:column;justify-content:flex-start;padding:12px 4px;gap:10px;height:100%;cursor:pointer}
/* Edit FAB on canvas */
.canvas-edit-fab{position:absolute;top:14px;left:14px;z-index:25;display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.canvas-edit-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:14px;background:var(--bg-panel-strong);border:1px solid var(--border-main);box-shadow:var(--panel-shadow);backdrop-filter:blur(14px);font-size:12px;font-weight:700;color:var(--text-secondary);cursor:pointer;transition:all .18s;letter-spacing:.02em}
.canvas-edit-btn:hover{background:var(--bg-panel);color:var(--text-primary);transform:translateY(-1px)}
.canvas-edit-btn.active{background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border-color:transparent;box-shadow:0 10px 22px rgba(59,130,246,.3)}
.canvas-edit-menu{display:none;flex-direction:column;gap:4px;padding:8px;border-radius:14px;background:var(--bg-panel-strong);border:1px solid var(--border-main);box-shadow:var(--panel-shadow);backdrop-filter:blur(14px);min-width:170px}
.canvas-edit-menu.open{display:flex}
.canvas-edit-menu button{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:12.5px;font-weight:600;text-align:left;cursor:pointer;transition:background .15s;border:1px solid transparent;background:transparent;color:var(--text-secondary)}
.canvas-edit-menu button:hover{background:var(--bg-soft);color:var(--text-primary)}
.canvas-edit-menu .edit-hint{padding:7px 10px;font-size:11px;color:var(--text-muted);background:var(--bg-soft);border:1px dashed var(--border-main);border-radius:9px;line-height:1.4}
body:not(.edit-mode) .node-port{display:none!important}

/* Right panel */
#right-panel{position:absolute;top:0;right:0;height:100%;z-index:35;transition:opacity .2s ease,transform .25s ease,border .2s ease;overflow:hidden}
#right-panel.hidden-panel{opacity:0;pointer-events:none;transform:translateX(12px)}

/* Send button icon */
.send-btn{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;box-shadow:0 10px 18px rgba(59,130,246,0.22)}
.send-btn:hover{transform:translateY(-1px) scale(1.02);filter:brightness(1.03)}
.send-btn:active{transform:scale(0.97)}

/* Node collapse/expand */
.node-detail{overflow:hidden;max-height:0;transition:max-height .25s ease,opacity .2s ease;opacity:0}
.node-detail.expanded{max-height:500px;opacity:1}
.node-toggle{width:18px;height:18px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;border:none;background:transparent;color:var(--text-faint);font-size:10px;opacity:0;pointer-events:none}
.canvas-node:hover .node-toggle{opacity:1;pointer-events:auto}
.node-toggle:hover{background:rgba(15,23,42,0.08);color:var(--text-secondary)}
.node-toggle svg{transition:transform .2s ease}
.node-toggle.is-expanded svg{transform:rotate(90deg)}
.node-toggle.is-expanded{opacity:1;pointer-events:auto}

/* Force layout toggle */
.force-toggle{display:flex;align-items:center;justify-content:center;gap:0;padding:9px 12px;border-radius:12px;background:var(--zoom-bg);border:1px solid var(--zoom-border);font-size:11px;font-weight:700;color:var(--zoom-text);cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none;box-shadow:0 8px 16px rgba(15,23,42,0.06)}
.force-toggle:hover{background:var(--zoom-hover);color:var(--text-primary);transform:translateY(-1px)}
.force-toggle.active{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.38);color:#2563eb}
[data-theme="dark"] .force-toggle.active{background:rgba(96,165,250,0.16);border-color:rgba(96,165,250,0.42);color:#93c5fd}

/* Canvas group legend */
.canvas-legend{position:absolute;top:18px;right:18px;z-index:20;min-width:180px;max-width:260px;padding:10px 12px;border-radius:14px;background:var(--bg-panel-strong);border:1px solid var(--border-main);backdrop-filter:blur(14px);box-shadow:var(--panel-shadow)}
.canvas-legend-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px}
.canvas-legend-list{display:flex;flex-direction:column;gap:6px}
.canvas-legend-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 0}
.canvas-legend-name{display:flex;align-items:center;gap:8px;min-width:0;color:var(--text-secondary);font-size:12px;font-weight:600}
.canvas-legend-name span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.canvas-legend-count{font-size:11px;color:var(--text-faint);flex-shrink:0}

/* Right panel enhanced */
.prop-section{margin-bottom:20px}
.prop-section-title{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text-faint);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.prop-section-title::before{content:'';display:block;width:4px;height:12px;border-radius:999px;background:linear-gradient(180deg,#60a5fa,#818cf8);opacity:.85}
.prop-card{background:var(--bg-soft);border:1px solid var(--border-subtle);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:none}
.prop-field{margin-bottom:12px}
.prop-field:last-child{margin-bottom:0}
.prop-field-label{font-size:11px;color:var(--text-faint);margin-bottom:6px;display:block;font-weight:600}
.prop-header{display:flex;align-items:center;gap:12px;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border-subtle)}
.prop-header .prop-type-badge{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;box-shadow:none}
.prop-header .prop-name{font-size:17px;font-weight:700;color:var(--text-primary);line-height:1.25}
.prop-header .prop-type-label{font-size:11px;color:var(--text-faint);margin-top:2px}
.prop-attr-row{display:flex;gap:6px;align-items:center;margin-bottom:4px;padding:5px 7px;background:var(--bg-panel-strong);border:1px solid var(--border-subtle);border-radius:10px;transition:border-color .15s,background .15s;min-height:36px}
.prop-attr-row:hover{border-color:var(--border-input);background:var(--bg-input)}
.prop-attr-row:last-child{margin-bottom:0}
.prop-attr-row .input{padding:6px 8px!important;font-size:12px!important;min-height:28px;line-height:1.2}
.prop-instance-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-soft);border:1px solid var(--border-subtle);border-radius:12px;margin-top:4px}
.group-swatch{width:18px;height:18px;border-radius:999px;border:1px solid var(--border-main);display:inline-block;flex-shrink:0}
.group-color-input{width:34px;height:28px;padding:0;border:none;background:transparent;border-radius:8px;cursor:pointer;overflow:hidden;flex-shrink:0}
.group-color-input::-webkit-color-swatch-wrapper{padding:0}
.group-color-input::-webkit-color-swatch{border:none;border-radius:8px}
.group-color-input::-moz-color-swatch{border:none;border-radius:8px}

.tree-section{background:var(--tree-section-bg);border:1px solid var(--border-subtle);border-radius:16px;padding:6px;margin-bottom:8px;backdrop-filter:blur(12px)}
.tree-section-header{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:10px;cursor:pointer;color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.tree-section-header:hover{background:var(--bg-hover)}
.tree-section-body{padding:3px 1px 1px}
.view-toggle{display:flex;align-items:center;gap:4px;border-radius:18px;padding:4px;background:var(--view-toggle-bg);box-shadow:inset 0 1px 0 rgba(255,255,255,0.08)}
.view-toggle-btn{min-width:68px;padding:9px 16px;border-radius:14px;font-size:12px;font-weight:700;letter-spacing:.01em;transition:all .18s ease;border:1px solid transparent;color:var(--text-muted);background:transparent;display:flex;align-items:center;justify-content:center}
.view-toggle-btn:hover{background:rgba(255,255,255,0.28);color:var(--text-primary)}
.view-toggle-btn.active{background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;box-shadow:0 8px 18px rgba(59,130,246,0.22)}
.toolbar-right{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 auto}
.toolbar-right .view-toggle{flex:0 0 auto}
.toolbar-right .relative.flex-1{flex:1 1 auto;min-width:220px}
.list-surface{background:var(--bg-soft);border:1px solid var(--border-subtle);border-radius:18px;padding:14px}

/* ===== UI REFINEMENT OVERRIDES ===== */
body{font-size:15px}
#app-shell{padding:16px;gap:14px}
header,#canvas-view,#list-view,#right-panel,#ai-panel,#canvas-viewport{border-radius:16px!important}
.canvas-node{font-size:14px!important}
.node-object{border-radius:9999px!important;min-width:0!important;min-height:0!important;padding:0!important}
.node-object .node-title{padding:0!important;white-space:normal;text-align:center;line-height:1.08!important;font-size:13.5px!important;max-width:78px!important}
.node-action{border-radius:12px!important;min-height:44px!important}
.node-rule{border-radius:10px!important;min-height:42px!important}
.node-title{font-size:13.5px!important;padding:6px 8px!important}
.conn-path{stroke-width:1.05!important}
.conn-label{font-size:11.5px!important}
.btn,.input,.tree-item,.tab-btn,.view-toggle-btn,table.data-table,.ai-msg{font-size:13px!important}
.input{padding:11px 14px!important;border-radius:12px!important}
.btn,.theme-toggle,.zoom-btn,.send-btn,.force-toggle,.view-toggle-btn{border-radius:12px!important}
.tree-section,.prop-card,.modal-box,.list-surface{border-radius:14px!important}
.prop-attr-row,.prop-instance-bar,.tree-item{border-radius:10px!important}
.prop-section-title{font-size:12px!important;margin-bottom:12px!important}
.prop-field-label{font-size:12px!important;margin-bottom:8px!important}
.prop-name{font-size:18px!important}
.tree-item{padding:5px 8px!important;min-height:28px!important;line-height:1.1!important}
.tree-section{padding:5px!important;margin-bottom:7px!important}
.tree-section-header{padding:6px 8px!important}
.tree-section-body{padding:2px 0 0!important}
.view-toggle{gap:6px!important;padding:5px 6px!important;border-radius:14px!important}
.view-toggle-btn{min-width:84px!important;padding:10px 18px!important}
#search-input{padding-left:46px!important;padding-right:14px!important;font-size:14px!important}
#search-input + svg{left:15px!important;width:16px!important;height:16px!important}
header > .toolbar-right{margin-left:24px!important;justify-content:flex-start!important;flex:1 1 auto!important;min-width:0!important;padding-right:2px!important}
#ops-menu-btn{min-width:92px!important}
#ops-menu-btn,#search-input,.theme-toggle,.view-toggle{box-shadow:none!important}
#right-panel{padding:12px 12px 10px!important}
#right-panel > div:first-child{margin-top:8px;padding:22px 18px 14px!important;border:none!important;border-radius:0!important;background:transparent!important}
#right-panel > #props-panel{margin-top:8px;margin-bottom:4px;padding:18px 18px 16px!important;border:none!important;border-radius:0!important;background:transparent!important}
#ai-panel .input{padding-top:10px!important;padding-bottom:10px!important}
</style>
</head>
<body>
<div id="app-shell" class="flex flex-col h-screen">

<!-- ===== HEADER ===== -->
<header class="panel-glass h-16 flex items-center px-5 gap-5 shrink-0 z-30 rounded-[22px]" style="background:var(--bg-panel-strong);border:1px solid var(--border-main);box-shadow:var(--header-shadow)">
  <div class="flex items-center gap-3 shrink-0">
    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-blue-500 via-indigo-500 to-violet-600 flex items-center justify-center text-white font-bold text-sm shadow-lg">O</div>
    <div>
      <h1 class="font-semibold text-[15px] leading-tight" style="color:var(--text-primary)">语义本体构建工具</h1>
      <p class="text-[11px] leading-tight mt-0.5" style="color:var(--text-faint)">语义本体可视化建模与数据映射平台</p>
    </div>
  </div>

  <div class="toolbar-right flex items-center gap-3 min-w-0 pr-1">
    <div class="view-toggle shrink-0">
      <button onclick="setView('canvas')" id="btn-canvas" class="view-toggle-btn active">画布</button>
      <button onclick="setView('list')" id="btn-list" class="view-toggle-btn">列表</button>
    </div>

    <div class="relative flex-1 min-w-[220px] max-w-none">
      <input type="text" id="search-input" placeholder="搜索对象、动作、规则..." class="input pl-10 text-sm w-full" oninput="handleSearch(this.value)">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color:var(--text-faint)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>

    <div class="relative shrink-0 ml-auto">
      <button id="ops-menu-btn" class="btn btn-ghost" onclick="toggleOpsMenu(event)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        操作
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="ops-menu" class="hidden absolute right-0 top-[calc(100%+10px)] panel-glass">
        <button class="ops-menu-item" onclick="toggleOpsMenu();showImportModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg><span>导入</span>
        </button>
        <button class="ops-menu-item" onclick="toggleOpsMenu();showExportModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 6l-4-4-4 4M12 2v13"/></svg><span>导出</span>
        </button>
        <div class="ops-menu-sep"></div>
        <button class="ops-menu-item" onclick="toggleOpsMenu();showMappingModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M4 7h7M4 12h4m11 5H9m3-10l4 4-4 4"/></svg><span>数据映射</span>
        </button>
        <button class="ops-menu-item" onclick="toggleOpsMenu();showInstanceModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M3 10h18M3 14h18M3 6h18M3 18h18"/></svg><span>实例数据</span>
        </button>
        <div class="ops-menu-sep"></div>
        <button class="ops-menu-item" onclick="toggleOpsMenu();showAIConfigModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.3 24.3 0 014.5 0m0 0v5.714a2.25 2.25 0 00.659 1.591L19 14.5M14.25 3.104c.251.023.501.05.75.082M19 14.5l-2.47 2.47a2.25 2.25 0 00-.659 1.59v1.19a.75.75 0 01-.75.75h-6.24a.75.75 0 01-.75-.75v-1.19a2.25 2.25 0 00-.659-1.59L5 14.5"/></svg><span>AI模型配置</span>
        </button>
        <button class="ops-menu-item" onclick="toggleOpsMenu();showGroupManager()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M7 7h10M7 12h10M7 17h6"/></svg><span>对象分组管理</span>
        </button>
      </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" title="切换深浅色主题">
      <svg class="icon-sun w-4.5 h-4.5" style="color:#f59e0b" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <svg class="icon-moon w-4 h-4" style="color:#818cf8" fill="currentColor" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<!-- ===== MAIN LAYOUT ===== -->
<div class="flex flex-1 overflow-hidden relative gap-3 min-h-0">

  <!-- LEFT: AI PANEL (was bottom) -->
  <div id="ai-panel" class="panel-glass shrink-0 rounded-[22px]" style="width:340px;background:var(--bg-panel);border:1px solid var(--border-main)">
    <div id="ai-header" class="flex items-center px-4 h-12 cursor-pointer select-none gap-2" onclick="toggleAIPanel()">
      <span class="w-7 h-7 rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center text-[10px] text-white font-bold shadow-lg shrink-0">AI</span>
      <span id="ai-title-text" class="text-xs font-semibold whitespace-nowrap" style="color:var(--text-muted)">AI 本体助手</span>
      <span id="ai-status" class="text-[10px] truncate" style="color:var(--text-ghost)">未配置</span>
      <span id="ai-toggle-icon" class="ml-auto text-xs transition-transform" style="color:var(--text-faint)">‹</span>
    </div>
    <div id="ai-body" class="flex flex-col overflow-hidden" style="height:calc(100% - 48px)">
      <div id="ai-messages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2.5"></div>
      <div class="px-3 py-2 flex items-center justify-between" style="border-top:1px solid var(--border-subtle);background:var(--bg-soft)">
        <span id="stats-text" class="text-[10px]" style="color:var(--text-ghost)">O:0 L:0 A:0 R:0</span>
        <span id="zoom-text" class="text-[10px]" style="color:var(--text-ghost)">100%</span>
      </div>
      <div class="p-3 pt-2">
        <div class="flex gap-2 items-center">
          <input type="text" id="ai-input" class="input text-xs flex-1 min-w-0" placeholder='输入自然语言指令…' onkeydown="if(event.key==='Enter')sendAI()">
          <button id="ai-send-btn" class="send-btn" onclick="sendAI()" title="发送">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3 2l18 10L3 22l3-10zm0 0h8"/></svg>
          </button>
          <button id="ai-stop-btn" class="send-btn" onclick="stopAI()" title="中止当前对话" style="display:none;background:linear-gradient(135deg,#dc2626,#b91c1c);box-shadow:0 10px 18px rgba(220,38,38,0.28)">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER: CANVAS + LIST -->
  <div class="flex-1 relative flex flex-col overflow-hidden min-w-0">
    <!-- CANVAS VIEW -->
    <div id="canvas-view" class="panel-glass flex-1 relative rounded-[24px] overflow-hidden" style="background:var(--bg-panel);border:1px solid var(--border-main)">
      <div id="canvas-viewport">
        <div id="canvas-world">
          <svg id="connections-svg">
            <defs>
              <marker id="arrow-edge" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
                <polygon points="0 0, 8 3, 0 6" fill="var(--edge-stroke)"/>
              </marker>
              <marker id="arrow-edge-selected" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
                <polygon points="0 0, 8 3, 0 6" fill="var(--edge-stroke-selected)"/>
              </marker>
            </defs>
          </svg>
          <div id="nodes-container"></div>
        </div>
      </div>
      <!-- EDIT FAB (top-left of canvas) -->
      <div class="canvas-edit-fab">
        <button id="edit-mode-btn" class="canvas-edit-btn" onclick="toggleEditMode(event)" title="开启编辑模式以创建元素和连线">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          <span id="edit-mode-label">编辑</span>
        </button>
        <div id="edit-menu" class="canvas-edit-menu">
          <button onclick="addObject();closeEditMenu()"><span style="color:var(--tag-obj-text)">◉</span> 新建对象</button>
          <button onclick="addAction();closeEditMenu()"><span style="color:var(--tag-act-text)">▭</span> 新建动作</button>
          <button onclick="addRule();closeEditMenu()"><span style="color:var(--tag-rule-text)">▢</span> 新建规则</button>
        </div>
      </div>
      <div id="canvas-group-legend" class="canvas-legend"></div>
      <div class="zoom-ctrl">
        <button class="zoom-btn" onclick="zoomIn()" title="放大">+</button>
        <button class="zoom-btn" onclick="zoomOut()" title="缩小">−</button>
        <button class="zoom-btn text-xs" onclick="resetView()" title="重置视图">⊙</button>
        <button class="zoom-btn text-xs" onclick="fitAll()" title="适应全部">⊞</button>
      </div>

        <button id="action-visibility-switch" class="force-toggle active" onclick="toggleCanvasVisibility('action')" title="显示或隐藏动作元素">显示动作</button>
        <button id="rule-visibility-switch" class="force-toggle active" onclick="toggleCanvasVisibility('rule')" title="显示或隐藏规则元素">显示规则</button>

      <div id="link-mode-hint" class="hidden absolute top-4 left-1/2 -translate-x-1/2 text-white text-xs px-4 py-2.5 rounded-full z-20 font-medium shadow-lg" style="background:var(--link-hint-bg)">
        链接模式：点击源对象，再点击目标对象 | <button onclick="cancelLinkMode()" class="underline ml-1">取消 ESC</button>

      <div class="flex px-3" style="border-bottom:1px solid var(--border-main);background:var(--bg-panel-strong)">
        <button class="tab-btn active" data-tab="objects" onclick="switchTab('objects',this)">对象类型</button>
        <button class="tab-btn" data-tab="links" onclick="switchTab('links',this)">链接类型</button>
        <button class="tab-btn" data-tab="actions" onclick="switchTab('actions',this)">动作</button>
        <button class="tab-btn" data-tab="rules" onclick="switchTab('rules',this)">规则约束</button>
      </div>

    <!-- RIGHT SIDEBAR: PROPERTIES (overlay, hidden by default) -->
    <div id="right-panel" class="panel-glass flex flex-col hidden-panel rounded-[22px]" style="width:380px;background:var(--bg-panel);border:1px solid var(--border-main)">
      <div class="px-5 pt-5 pb-4 flex items-center justify-between" style="border-bottom:1px solid var(--border-main)">
        <div>
          <span class="text-[11px] font-semibold uppercase tracking-[0.18em]" style="color:var(--text-faint)">属性面板</span>
          <div class="text-[11px] mt-1" style="color:var(--text-muted)">查看并编辑当前选中元素</div>
        </div>
        <div class="flex items-center gap-2">
          <button class="w-9 h-9 rounded-xl flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/5" style="color:var(--text-faint)" onclick="hideRightPanel()" title="关闭面板">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div id="props-panel" class="flex-1 overflow-y-auto px-5 py-5">
        <div class="text-center py-20 text-xs" style="color:var(--text-ghost)">
          <div class="text-5xl mb-4" style="opacity:var(--empty-icon-opacity)">◇</div>
          选择一个元素<br>以查看和编辑属性
        </div>
      </div>
    </div>
  </div>
</div>

</div>

<!-- ===== MODAL CONTAINER ===== -->
<div id="modal-container"></div>

<script>
// ============================================================
// THEME
// ============================================================
function getTheme() {
  return localStorage.getItem('ola-theme') || 'light';
}
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ola-theme', t);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  setTheme(current === 'dark' ? 'light' : 'dark');
}
// Apply saved theme immediately
setTheme(getTheme());

// ============================================================
// STATE
// ============================================================
const app = {
  objects: [],
  links: [],
  actions: [],
  rules: [],
  canvas: { panX: 0, panY: 0, scale: 1 },
  selection: null,
  view: 'canvas',
  listTab: 'objects',
  searchQuery: '',
  linkMode: { active: false, sourceId: null },
  drag: { active: false, type: null, id: null, startX: 0, startY: 0, elStartX: 0, elStartY: 0, moved: false },
  connecting: { active: false, sourceId: null, sourcePort: null },
  hoverId: null,
  aiConfig: { endpoint: 'https://openrouter.ai/api/v1', model: 'openai/gpt-oss-120b:free', apiKey: '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' },
  aiExpanded: true,
  editMode: false,
  aiMessages: [],
  aiBatchMode: false,
  aiBatchBuffer: [],
  groups: [
    { id: 'grp_core', name: '核心对象', color: '#3b82f6' },
    { id: 'grp_org', name: '组织对象', color: '#10b981' },
    { id: 'grp_doc', name: '资源对象', color: '#f59e0b' },
    { id: 'grp_rule', name: '治理对象', color: '#8b5cf6' }
  ],
  groupPalette: ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1'],
  nodeW: 210,
  leftSidebarOpen: true,
  rightPanelOpen: false,
  expandedNodes: new Set(),
  treeSections: { object: true, link: true, action: true, rule: true },
  visibility: { action: true, rule: true },
  forceLayout: {
    enabled: false,
    timer: null,
    velocities: {},
    burstUntil: 0,
    settleFrames: 0,
    anchorId: null,
    dragPin: false,
    phase: 'idle',
    lastTick: 0,
    freezeAfterSettle: true,
    hoverFocusId: null,
    clickFocusId: null
  },
  virtualSelection: null,
  suppressClick: { id: null, until: 0 },
  opsMenuOpen: false
};

function uid() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }

// ============================================================
// EDIT MODE (canvas top-left FAB)
// ============================================================
function toggleEditMode(event) {
  if (event) event.stopPropagation();
  app.editMode = !app.editMode;
  document.body.classList.toggle('edit-mode', app.editMode);
  document.getElementById('edit-mode-btn').classList.toggle('active', app.editMode);
  document.getElementById('edit-mode-label').textContent = app.editMode ? '编辑中' : '编辑';
  const menu = document.getElementById('edit-menu');
  menu.classList.toggle('open', app.editMode);
  if (!app.editMode) {
    if (app.linkMode.active) cancelLinkMode();
    if (app.connecting.active) {
      app.connecting = { active: false, sourceId: null, sourcePort: null };
      const t = document.getElementById('temp-connection'); if (t) t.innerHTML = '';
    }
  }
}
function closeEditMenu() { /* keep menu open in edit mode; no-op for now */ }
function ensureEditMode(actionLabel) {
  if (!app.editMode) {
    alert((actionLabel || '该操作') + '需要先开启“编辑”模式（画布左上角）');
    return false;
  }
  return true;
}

function syncOpsMenu() {
  const menu = document.getElementById('ops-menu');
  if (!menu) return;
  menu.classList.toggle('hidden', !app.opsMenuOpen);
}

function toggleOpsMenu(event) {
  if (event) event.stopPropagation();
  app.opsMenuOpen = !app.opsMenuOpen;
  syncOpsMenu();
}

function closeOpsMenu() {
  if (!app.opsMenuOpen) return;
  app.opsMenuOpen = false;
  syncOpsMenu();
}

function showRightPanel() {
  app.rightPanelOpen = true;
  document.getElementById('right-panel').classList.remove('hidden-panel');
}

function hideRightPanel() {
  app.rightPanelOpen = false;
  document.getElementById('right-panel').classList.add('hidden-panel');
  app.selection = null;
  app.virtualSelection = null;
  document.querySelectorAll('.canvas-node').forEach(n => n.classList.remove('selected'));
  updateConnections();
  renderTree();
}

// ============================================================
// FIND / HELPERS
// ============================================================
function findElement(id) {
  return app.objects.find(e => e.id === id)
    || app.links.find(e => e.id === id)
    || app.actions.find(e => e.id === id)
    || app.rules.find(e => e.id === id);
}
function allElements() { return [...app.objects, ...app.links, ...app.actions, ...app.rules]; }
function getGroupById(id) {
  return app.groups.find(g => g.id === id) || null;
}
function getObjectGroupColor(obj) {
  return getGroupById(obj?.groupId)?.color || obj?.color || '#3b82f6';
}
function hexToRgb(hex) {
  const n = String(hex || '').replace('#','');
  const full = n.length === 3 ? n.split('').map(ch => ch + ch).join('') : n.padEnd(6, '0');
  const num = parseInt(full.slice(0,6), 16);
  return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
}
function rgba(hex, alpha) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}
function getObjectNodeStyle(obj) {
  const c = getObjectGroupColor(obj);
  const isSelected = app.selection === obj.id;
  const isHovered = app.hoverId === obj.id;
  if (isSelected) {
    return `background:${rgba(c, 0.22)};border-color:${rgba(c, 0.9)};border-width:2.2px`;
  }
  if (isHovered) {
    return `background:${rgba(c, 0.17)};border-color:${rgba(c, 0.68)};border-width:2px`;
  }
  return `background:${rgba(c, 0.11)};border-color:${rgba(c, 0.34)};border-width:1.2px`;
}
function refreshNodeInteractiveStyles() {
  document.querySelectorAll('.canvas-node').forEach(n => {
    const id = n.dataset.id;
    const type = n.dataset.type;
    n.classList.toggle('selected', app.selection === id);
    n.classList.toggle('hovered', app.hoverId === id);
    if (type === 'object') {
      const obj = app.objects.find(o => o.id === id);
      if (obj) {
        const prevW = n.style.width;
        const prevH = n.style.height;
        n.style.cssText = `left:${obj.x}px;top:${obj.y}px;${getObjectNodeStyle(obj)}`;
        n.style.borderRadius = '9999px';
        if (prevW && prevH) {
          const size = Math.max(parseFloat(prevW) || 0, parseFloat(prevH) || 0);
          if (size > 0) {
            n.style.width = size + 'px';
            n.style.height = size + 'px';
          }
        }
      }
    }
  });
  normalizeObjectCircles();
}
function getCollection(type) {
  return type === 'object' ? app.objects : type === 'link' ? app.links : type === 'action' ? app.actions : app.rules;
}
function removeFromCollection(id) {
  app.objects = app.objects.filter(e => e.id !== id);
  app.links = app.links.filter(e => e.id !== id);
  app.actions = app.actions.filter(e => e.id !== id);
  app.rules = app.rules.filter(e => e.id !== id);
  app.links = app.links.filter(l => l.sourceId !== id && l.targetId !== id);
  app.actions.forEach(a => { if (a.triggerObjectId === id) a.triggerObjectId = ''; });
  app.rules.forEach(r => { if (r.targetObjectId === id) r.targetObjectId = ''; });
}

function getNodeRect(el) {
  const dom = document.querySelector(`[data-id="${el.id}"]`);
  const w = dom ? dom.offsetWidth : app.nodeW;
  const h = dom ? dom.offsetHeight : 100;
  return { x: el.x, y: el.y, w, h, cx: el.x + w / 2, cy: el.y + h / 2 };
}

function viewCenter() {
  const vp = document.getElementById('canvas-viewport');
  return {
    x: (-app.canvas.panX + vp.clientWidth / 2) / app.canvas.scale,
    y: (-app.canvas.panY + vp.clientHeight / 2) / app.canvas.scale
  };
}

// ============================================================
// CRUD
// ============================================================
function addObject(name, x, y) {
  const c = viewCenter();
  const defaultGroup = app.groups[0] || null;
  const obj = {
    id: uid(), type: 'object',
    name: name || '新对象_' + (app.objects.length + 1),
    description: '',
    groupId: defaultGroup?.id || '',
    properties: [{ name: '编号', dataType: 'string', required: true }],
    x: x ?? (c.x - 70 + Math.random() * 36),
    y: y ?? (c.y - 38 + Math.random() * 36),
    color: defaultGroup?.color || '#3b82f6',
    mapping: { table: '', columns: {} },
    instances: []
  };
  app.objects.push(obj);
  selectElement(obj.id);
  render();
  return obj;
}

function addLinkBetween(sourceId, targetId, name) {
  const link = {
    id: uid(), type: 'link',
    name: name || '关系_' + (app.links.length + 1),
    description: '',
    sourceId, targetId,
    cardinality: '多对多',
    properties: []
  };
  app.links.push(link);
  selectElement(link.id);
  render();
  return link;
}

function addAction(name, x, y) {
  const c = viewCenter();
  const act = {
    id: uid(), type: 'action',
    name: name || '动作_' + (app.actions.length + 1),
    description: '',
    triggerObjectId: '',
    triggerEvent: '创建',
    conditions: '',
    operations: '',
    x: x ?? (c.x - 72 + Math.random() * 36),
    y: y ?? (c.y - 36 + Math.random() * 36)
  };
  app.actions.push(act);
  selectElement(act.id);
  render();
  return act;
}

function addRule(name, x, y) {
  const c = viewCenter();
  const rule = {
    id: uid(), type: 'rule',
    name: name || '规则_' + (app.rules.length + 1),
    description: '',
    targetObjectId: '',
    ruleType: '验证',
    expression: '',
    x: x ?? (c.x - 72 + Math.random() * 36),
    y: y ?? (c.y - 36 + Math.random() * 36)
  };
  app.rules.push(rule);
  selectElement(rule.id);
  render();
  return rule;
}

function selectElement(id, showPanel = true) {
  app.selection = id;
  app.virtualSelection = null;
  app.forceLayout.clickFocusId = id || null;
  if (id && showPanel) {
    showRightPanel();
  }
  if (!showPanel) {
    app.rightPanelOpen = false;
    document.getElementById('right-panel')?.classList.add('hidden-panel');
  }
  renderProps();
  renderTree();
  refreshNodeInteractiveStyles();
  updateConnections();
}

function selectVirtualConnection(kind, ownerId) {
  app.selection = null;
  app.virtualSelection = { kind, ownerId };
  showRightPanel();
  renderProps();
  renderTree();
  refreshNodeInteractiveStyles();
  updateConnections();
}

function setHoverElement(id) {
  if (app.hoverId === id) return;
  app.hoverId = id;
  app.forceLayout.hoverFocusId = id || null;
  refreshNodeInteractiveStyles();
  updateConnections();
}

function clearHoverElement(id) {
  if (id && app.hoverId && app.hoverId !== id) return;
  app.hoverId = null;
  app.forceLayout.hoverFocusId = null;
  refreshNodeInteractiveStyles();
  updateConnections();
}

function deleteSelected() {
  if (app.virtualSelection) {
    const label = app.virtualSelection.kind === 'action-target' ? '动作与对象的连接' : '规则与对象的连接';
    if (!confirm(`确定删除该${label}？`)) return;
    if (app.virtualSelection.kind === 'action-target') {
      const act = app.actions.find(a => a.id === app.virtualSelection.ownerId);
      if (act) act.triggerObjectId = '';
    } else if (app.virtualSelection.kind === 'rule-target') {
      const rule = app.rules.find(r => r.id === app.virtualSelection.ownerId);
      if (rule) rule.targetObjectId = '';
    }
    app.virtualSelection = null;
    hideRightPanel();
    render();
    return;
  }
  if (!app.selection) return;
  if (!confirm('确定删除该元素？相关链接也会被移除。')) return;
  removeFromCollection(app.selection);
  app.selection = null;
  hideRightPanel();
  render();
}

// ============================================================
// LINK MODE
// ============================================================
function startLinkMode() {
  app.linkMode = { active: true, sourceId: null };
  document.getElementById('link-mode-hint').classList.remove('hidden');
  document.getElementById('canvas-viewport').style.cursor = 'crosshair';
}
function cancelLinkMode() {
  app.linkMode = { active: false, sourceId: null };
  document.getElementById('link-mode-hint').classList.add('hidden');
  document.getElementById('canvas-viewport').style.cursor = '';
}
function handleLinkModeClick(nodeId) {
  const el = findElement(nodeId);
  if (!el || el.type !== 'object') return;
  if (!app.linkMode.sourceId) {
    app.linkMode.sourceId = nodeId;
    document.querySelector(`[data-id="${nodeId}"]`).style.outline = '2px solid #10b981';
  } else if (nodeId !== app.linkMode.sourceId) {
    const name = prompt('请输入链接名称:', '关系_' + (app.links.length + 1));
    if (name) addLinkBetween(app.linkMode.sourceId, nodeId, name);
    document.querySelector(`[data-id="${app.linkMode.sourceId}"]`).style.outline = '';
    cancelLinkMode();
  }
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  renderTree();
  renderStats();
  renderCanvasLegend();
  if (app.view === 'canvas') {
    renderCanvas();
  } else {
    renderList();
  }
  renderProps();
}

function renderStats() {
  document.getElementById('stats-text').textContent = `O:${app.objects.length} L:${app.links.length} A:${app.actions.length} R:${app.rules.length}`;
  document.getElementById('zoom-text').textContent = Math.round(app.canvas.scale * 100) + '%';
}

function renderCanvasLegend() {
  const legend = document.getElementById('canvas-group-legend');
  if (!legend) return;
  const groupCounts = app.groups
    .map(g => ({ ...g, count: app.objects.filter(o => (o.groupId || '') === g.id).length }))
    .filter(g => g.count > 0);

  if (groupCounts.length === 0) {
    legend.innerHTML = '';
    legend.style.display = 'none';
    return;
  }

  legend.style.display = '';
  legend.innerHTML = `
    <div class="canvas-legend-title">对象分组图例</div>
    <div class="canvas-legend-list">
      ${groupCounts.map(g => `
        <div class="canvas-legend-item">
          <div class="canvas-legend-name">
            <span class="group-dot" style="background:${g.color}"></span>
            <span>${g.name}</span>
          </div>
          <span class="canvas-legend-count">${g.count}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function toggleTreeSection(type) {
  app.treeSections[type] = !app.treeSections[type];
  renderTree();
}

function renderTree() {
  const tree = document.getElementById('element-tree');
  if (!tree) return;
  const q = app.searchQuery.toLowerCase();
  let html = '';
  const sections = [
    { label: '对象', items: app.objects, icon: '◆', badge: 'badge-obj', type: 'object' },
    { label: '动作', items: app.actions, icon: '⚡', badge: 'badge-act', type: 'action' },
    { label: '规则', items: app.rules, icon: '◈', badge: 'badge-rule', type: 'rule' }
  ];
  for (const sec of sections) {
    const filtered = q ? sec.items.filter(it => it.name.toLowerCase().includes(q)) : sec.items;
    if (sec.items.length === 0 && !q) continue;
    const expanded = q ? true : !!app.treeSections[sec.type];
    html += `<div class="tree-section">
      <button class="tree-section-header w-full" onclick="toggleTreeSection('${sec.type}')">
        <span class="flex items-center gap-1.5"><span>${sec.icon}</span><span>${sec.label}</span><span style="color:var(--text-ghost)">(${filtered.length})</span></span>
        <span style="color:var(--text-faint);transition:transform .15s;display:inline-block;transform:${expanded ? 'rotate(90deg)' : 'rotate(0deg)'}">▶</span>
      </button>`;
    if (expanded) {
      html += `<div class="tree-section-body">`;
      for (const it of filtered) {
        const groupDot = sec.type === 'object' ? `<span class="group-dot" style="background:${getObjectGroupColor(it)}"></span>` : '';
        html += `<div class="tree-item ${app.selection === it.id ? 'active' : ''}" onclick="selectElement('${it.id}');scrollToNode('${it.id}')" ondblclick="focusOnNode('${it.id}')">
          ${groupDot}
          <span class="tag ${sec.badge}" style="padding:2px 6px;font-size:9px">${sec.icon}</span>
          <span class="truncate">${it.name}</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  tree.innerHTML = html || '<div class="text-xs text-center py-4" style="color:var(--text-ghost)">暂无元素</div>';
}

function scrollToNode(id) {
  const el = findElement(id);
  if (!el || el.type === 'link') return;
  selectElement(id);
}

function focusOnNode(id) {
  const el = findElement(id);
  if (!el || el.type === 'link') return;
  const vp = document.getElementById('canvas-viewport');
  const dom = document.querySelector(`[data-id="${id}"]`);
  const w = dom ? dom.offsetWidth : 210;
  const h = dom ? dom.offsetHeight : 100;
  app.canvas.panX = -(el.x + w / 2) * app.canvas.scale + vp.clientWidth / 2;
  app.canvas.panY = -(el.y + h / 2) * app.canvas.scale + vp.clientHeight / 2;
  applyCanvasTransform();
  if (app.view !== 'canvas') setView('canvas');
}

// ============================================================
// CANVAS RENDERING
// ============================================================
function ensureCanvasWorldSize() {
  const world = document.getElementById('canvas-world');
  const svg = document.getElementById('connections-svg');
  if (!world || !svg) return;
  const elems = [...app.objects, ...app.actions, ...app.rules];
  let maxX = 2400, maxY = 1800;
  for (const el of elems) {
    const dom = document.querySelector(`[data-id="${el.id}"]`);
    const w = dom ? dom.offsetWidth : (el.type === 'object' ? 90 : 130);
    const h = dom ? dom.offsetHeight : (el.type === 'object' ? 90 : 46);
    maxX = Math.max(maxX, el.x + w + 800);
    maxY = Math.max(maxY, el.y + h + 800);
  }
  const worldW = Math.max(8000, Math.ceil(maxX / 1000) * 1000);
  const worldH = Math.max(8000, Math.ceil(maxY / 1000) * 1000);
  world.style.width = worldW + 'px';
  world.style.height = worldH + 'px';
  svg.setAttribute('viewBox', `0 0 ${worldW} ${worldH}`);
}

function renderCanvas() {
  normalizeAllImportedData();
  const container = document.getElementById('nodes-container');
  const q = app.searchQuery.toLowerCase();
  let html = '';

  // Render objects
  for (const obj of app.objects) {
    const hl = q && obj.name.toLowerCase().includes(q) ? ' search-highlight' : '';
    const groupColor = getObjectGroupColor(obj);
    html += `<div class="canvas-node node-object obj-color${hl}${app.selection === obj.id ? ' selected' : ''}${app.hoverId === obj.id ? ' hovered' : ''}" data-id="${obj.id}" data-type="object"
      style="left:${obj.x}px;top:${obj.y}px;${getObjectNodeStyle(obj)}" onmousedown="onNodeMouseDown(event,'${obj.id}')" onclick="onNodeClick(event,'${obj.id}')" onmouseenter="setHoverElement('${obj.id}')" onmouseleave="clearHoverElement('${obj.id}')">
      <div class="node-port port-top" data-port="top" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','top')"></div>
      <div class="node-port port-right" data-port="right" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','right')"></div>
      <div class="node-port port-bottom" data-port="bottom" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','bottom')"></div>
      <div class="node-port port-left" data-port="left" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','left')"></div>
      <div class="node-port port-top-left" data-port="top-left" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','top-left')"></div>
      <div class="node-port port-top-right" data-port="top-right" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','top-right')"></div>
      <div class="node-port port-bottom-right" data-port="bottom-right" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','bottom-right')"></div>
      <div class="node-port port-bottom-left" data-port="bottom-left" data-owner="${obj.id}" onmousedown="onPortMouseDown(event,'${obj.id}','bottom-left')"></div>
      <div class="node-title" style="color:${groupColor}">${obj.name}</div>
    </div>`;
  }

  // Render actions
  if (app.visibility.action) {
    for (const act of app.actions) {
      const hl = q && act.name.toLowerCase().includes(q) ? ' search-highlight' : '';
      html += `<div class="canvas-node node-action act-color${hl}${app.selection === act.id ? ' selected' : ''}${app.hoverId === act.id ? ' hovered' : ''}" data-id="${act.id}" data-type="action"
        style="left:${act.x}px;top:${act.y}px" onmousedown="onNodeMouseDown(event,'${act.id}')" onclick="onNodeClick(event,'${act.id}')" onmouseenter="setHoverElement('${act.id}')" onmouseleave="clearHoverElement('${act.id}')">
        <div class="node-port port-top" data-port="top" data-owner="${act.id}" onmousedown="onPortMouseDown(event,'${act.id}','top')"></div>
        <div class="node-port port-right" data-port="right" data-owner="${act.id}" onmousedown="onPortMouseDown(event,'${act.id}','right')"></div>
        <div class="node-port port-bottom" data-port="bottom" data-owner="${act.id}" onmousedown="onPortMouseDown(event,'${act.id}','bottom')"></div>
        <div class="node-port port-left" data-port="left" data-owner="${act.id}" onmousedown="onPortMouseDown(event,'${act.id}','left')"></div>
        <div class="node-title" style="color:var(--act-name)">${act.name}</div>
      </div>`;
    }
  }

  // Render rules
  if (app.visibility.rule) {
    for (const rule of app.rules) {
      const hl = q && rule.name.toLowerCase().includes(q) ? ' search-highlight' : '';
      html += `<div class="canvas-node node-rule rule-color${hl}${app.selection === rule.id ? ' selected' : ''}${app.hoverId === rule.id ? ' hovered' : ''}" data-id="${rule.id}" data-type="rule"
        style="left:${rule.x}px;top:${rule.y}px" onmousedown="onNodeMouseDown(event,'${rule.id}')" onclick="onNodeClick(event,'${rule.id}')" onmouseenter="setHoverElement('${rule.id}')" onmouseleave="clearHoverElement('${rule.id}')">
        <div class="node-port port-top" data-port="top" data-owner="${rule.id}" onmousedown="onPortMouseDown(event,'${rule.id}','top')"></div>
        <div class="node-port port-right" data-port="right" data-owner="${rule.id}" onmousedown="onPortMouseDown(event,'${rule.id}','right')"></div>
        <div class="node-port port-bottom" data-port="bottom" data-owner="${rule.id}" onmousedown="onPortMouseDown(event,'${rule.id}','bottom')"></div>
        <div class="node-port port-left" data-port="left" data-owner="${rule.id}" onmousedown="onPortMouseDown(event,'${rule.id}','left')"></div>
        <div class="node-title" style="color:var(--rule-name)">${rule.name}</div>
      </div>`;
    }
  }

  container.innerHTML = html;
  normalizeObjectCircles();
  ensureCanvasWorldSize();
  renderCanvasLegend();
  updateConnections();
}

function normalizeObjectData(obj) {
  if (!obj || obj.type !== 'object') return obj;
  obj.type = 'object';
  obj.name = String(obj.name || '未命名对象');
  obj.description = obj.description || '';
  obj.properties = Array.isArray(obj.properties) ? obj.properties.map(p => ({
    name: String(p?.name || '新属性'),
    dataType: p?.dataType || 'string',
    required: !!p?.required
  })) : [];
  obj.instances = Array.isArray(obj.instances) ? obj.instances : [];
  obj.mapping = obj.mapping && typeof obj.mapping === 'object' ? obj.mapping : { table: '', columns: {} };
  obj.x = Number.isFinite(+obj.x) ? +obj.x : 100;
  obj.y = Number.isFinite(+obj.y) ? +obj.y : 100;
  delete obj.width;
  delete obj.height;
  delete obj.size;
  delete obj.radius;
  delete obj.diameter;
  delete obj.minWidth;
  delete obj.minHeight;
  delete obj.maxWidth;
  delete obj.maxHeight;
  delete obj.style;
  return obj;
}

function normalizeAllImportedData() {
  app.objects = (app.objects || []).map(o => normalizeObjectData(o));
  app.links = (app.links || []).map(l => ({
    properties: [],
    cardinality: '一对多',
    description: '',
    ...l,
    type: 'link'
  }));
  app.actions = (app.actions || []).map(a => ({
    triggerEvent: '创建',
    conditions: '',
    operations: '',
    description: '',
    ...a,
    type: 'action'
  }));
  app.rules = (app.rules || []).map(r => ({
    ruleType: '约束',
    expression: '',
    description: '',
    ...r,
    type: 'rule'
  }));
}

function normalizeObjectCircles() {
  document.querySelectorAll('.canvas-node.node-object').forEach(node => {
    const title = node.querySelector('.node-title');
    if (!title) return;
    const forceOn = document.getElementById('canvas-viewport')?.classList.contains('force-on');
    const MAX_INNER = forceOn ? 92 : 84;
    const MIN_DIAMETER = forceOn ? 46 : 56;
    const PADDING = forceOn ? 4 : 6;
    node.style.padding = '0';
    node.style.minWidth = MIN_DIAMETER + 'px';
    node.style.minHeight = MIN_DIAMETER + 'px';
    node.style.width = 'auto';
    node.style.height = 'auto';
    title.style.maxWidth = MAX_INNER + 'px';
    title.style.width = 'auto';
    title.style.minWidth = '0';
    title.style.padding = '0';
    title.style.margin = '0';
    title.style.lineHeight = forceOn ? '1.02' : '1.08';
    title.style.wordBreak = 'break-word';
    title.style.overflowWrap = 'anywhere';

    const charCount = (title.textContent || '').trim().length;
    const naturalWidth = Math.ceil(title.scrollWidth);
    const targetInnerWidth = Math.min(MAX_INNER, Math.max(charCount <= 4 ? 20 : 30, naturalWidth));
    title.style.width = targetInnerWidth + 'px';

    let textW = Math.ceil(title.getBoundingClientRect().width);
    let textH = Math.ceil(title.scrollHeight);
    let diameter = Math.max(MIN_DIAMETER, textW + PADDING, textH + PADDING);

    title.style.width = Math.max(20, Math.min(MAX_INNER, diameter - PADDING)) + 'px';
    textW = Math.ceil(title.getBoundingClientRect().width);
    textH = Math.ceil(title.scrollHeight);
    diameter = Math.max(MIN_DIAMETER, textW + PADDING, textH + PADDING);

    if (charCount > 5 && textH > diameter - PADDING) {
      diameter = Math.max(diameter, textH + PADDING + 4);
    }

    node.style.width = diameter + 'px';
    node.style.height = diameter + 'px';
    title.style.width = Math.max(20, Math.min(MAX_INNER, diameter - PADDING)) + 'px';
  });
}

function getPortPoint(el, port) {
  const dom = document.querySelector(`[data-id="${el.id}"]`);
  const w = dom ? dom.offsetWidth : (el.type === 'object' ? 60 : 112);
  const h = dom ? dom.offsetHeight : (el.type === 'object' ? 60 : 34);
  switch (port) {
    case 'top': return { x: el.x + w / 2, y: el.y };
    case 'right': return { x: el.x + w, y: el.y + h / 2 };
    case 'bottom': return { x: el.x + w / 2, y: el.y + h };
    case 'left': return { x: el.x, y: el.y + h / 2 };
    case 'top-left': return { x: el.x + w * 0.18, y: el.y + h * 0.18 };
    case 'top-right': return { x: el.x + w * 0.82, y: el.y + h * 0.18 };
    case 'bottom-right': return { x: el.x + w * 0.82, y: el.y + h * 0.82 };
    case 'bottom-left': return { x: el.x + w * 0.18, y: el.y + h * 0.82 };
    default: return { x: el.x + w / 2, y: el.y + h / 2 };
  }
}

function getNodeBox(el) {
  const dom = document.querySelector(`[data-id="${el.id}"]`);
  const w = dom ? dom.offsetWidth : (el.type === 'object' ? 52 : 112);
  const h = dom ? dom.offsetHeight : (el.type === 'object' ? 52 : 34);
  return { x: el.x, y: el.y, w, h, cx: el.x + w / 2, cy: el.y + h / 2 };
}

function getAnchorCandidates(el) {
  const box = getNodeBox(el);
  const { x, y, w, h, cx, cy } = box;
  if (el.type === 'object') {
    return [
      { name: 'top', x: cx, y, nx: 0, ny: -1 },
      { name: 'top-right', x: x + w * 0.82, y: y + h * 0.18, nx: 0.707, ny: -0.707 },
      { name: 'right', x: x + w, y: cy, nx: 1, ny: 0 },
      { name: 'bottom-right', x: x + w * 0.82, y: y + h * 0.82, nx: 0.707, ny: 0.707 },
      { name: 'bottom', x: cx, y: y + h, nx: 0, ny: 1 },
      { name: 'bottom-left', x: x + w * 0.18, y: y + h * 0.82, nx: -0.707, ny: 0.707 },
      { name: 'left', x, y: cy, nx: -1, ny: 0 },
      { name: 'top-left', x: x + w * 0.18, y: y + h * 0.18, nx: -0.707, ny: -0.707 }
    ];
  }
  return [
    { name: 'top', x: cx, y, nx: 0, ny: -1 },
    { name: 'right', x: x + w, y: cy, nx: 1, ny: 0 },
    { name: 'bottom', x: cx, y: y + h, nx: 0, ny: 1 },
    { name: 'left', x, y: cy, nx: -1, ny: 0 }
  ];
}

function sameGroupObjects(a, b) {
  return !!(a && b && a.type === 'object' && b.type === 'object' && a.groupId && b.groupId && a.groupId === b.groupId);
}

function chooseBestAnchors(src, tgt) {
  const srcBox = getNodeBox(src);
  const tgtBox = getNodeBox(tgt);
  const dirX = tgtBox.cx - srcBox.cx;
  const dirY = tgtBox.cy - srcBox.cy;
  const dirLen = Math.sqrt(dirX * dirX + dirY * dirY) || 1;
  const ux = dirX / dirLen;
  const uy = dirY / dirLen;
  const srcCandidates = getAnchorCandidates(src);
  const tgtCandidates = getAnchorCandidates(tgt);

  let best = null;
  for (const s of srcCandidates) {
    for (const t of tgtCandidates) {
      const dx = t.x - s.x;
      const dy = t.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const sFacing = Math.max(0, s.nx * ux + s.ny * uy);
      const tFacing = Math.max(0, t.nx * (-ux) + t.ny * (-uy));
      const centerPenalty = Math.abs((s.x - srcBox.cx) * uy - (s.y - srcBox.cy) * ux) * 0.02
        + Math.abs((t.x - tgtBox.cx) * uy - (t.y - tgtBox.cy) * ux) * 0.02;
      const score = dist - (sFacing + tFacing) * 28 + centerPenalty;
      if (!best || score < best.score) {
        best = { score, sx: s.x, sy: s.y, tx: t.x, ty: t.y, dist, dx, dy };
      }
    }
  }
  return best || { sx: srcBox.cx, sy: srcBox.cy, tx: tgtBox.cx, ty: tgtBox.cy, dist: dirLen, dx: dirX, dy: dirY };
}

function updateConnections() {
  const svg = document.getElementById('connections-svg');
  const defs = svg.querySelector('defs').outerHTML;
  let paths = defs;

  for (const link of app.links) {
    const srcObj = app.objects.find(o => o.id === link.sourceId);
    const tgtObj = app.objects.find(o => o.id === link.targetId);
    if (!srcObj || !tgtObj) continue;
    const path = calcConnectionPath(srcObj, tgtObj);
    const isSelected = app.selection === link.id;
    const relatedToSelection = !!app.selection && (app.selection === srcObj.id || app.selection === tgtObj.id);
    const relatedToHover = !!app.hoverId && (app.hoverId === srcObj.id || app.hoverId === tgtObj.id);
    const emph = isSelected || relatedToSelection || relatedToHover;
    const strokeColor = isSelected ? 'var(--edge-stroke-selected)' : (emph ? 'rgba(59,130,246,0.92)' : 'var(--edge-stroke)');
    const strokeW = isSelected ? 2.35 : ((relatedToSelection || relatedToHover) ? 1.95 : 1.05);
    const q = app.searchQuery.toLowerCase();
    const hl = q && link.name.toLowerCase().includes(q);
    const pathId = `link-path-${link.id}`;
    const lblText = emph ? 'var(--conn-label-text-sel)' : 'var(--conn-label-text)';
    const markerId = emph ? 'arrow-edge-selected' : 'arrow-edge';
    const opacity = emph ? '0.98' : (hl ? '1' : '0.72');
    const startOffset = sameGroupObjects(srcObj, tgtObj) ? '56%' : '52%';

    paths += `<g style="pointer-events:all" onclick="event.stopPropagation();selectElement('${link.id}', true);renderCanvas()">
      <path id="${pathId}" class="conn-path" d="${path}" stroke="${strokeColor}" stroke-width="${strokeW}" marker-end="url(#${markerId})" opacity="${opacity}"/>
      <path class="conn-hit" d="${path}"/>
      <text class="conn-label" fill="${lblText}" style="font-weight:${emph ? '700' : '400'};opacity:${emph ? '1' : '0.82'}">
        <textPath href="#${pathId}" startOffset="${startOffset}" text-anchor="middle" side="left">${link.name}</textPath>
      </text>
    </g>`;
  }

  // Action→object dashed lines
  if (app.visibility.action) {
    for (const act of app.actions) {
      if (!act.triggerObjectId) continue;
      const tgtObj = app.objects.find(o => o.id === act.triggerObjectId);
      if (!tgtObj) continue;
      const path = calcConnectionPath(act, tgtObj, true);
      const selected = app.virtualSelection && app.virtualSelection.kind === 'action-target' && app.virtualSelection.ownerId === act.id;
      const relatedToSelection = app.selection === act.id || app.selection === tgtObj.id;
      const relatedToHover = app.hoverId === act.id || app.hoverId === tgtObj.id;
      const emph = selected || relatedToSelection || relatedToHover;
      paths += `<g style="pointer-events:all" onclick="event.stopPropagation();selectVirtualConnection('action-target','${act.id}')">
        <path class="conn-hit" d="${path}"/>
        <path d="${path}" stroke="${selected ? 'var(--edge-stroke-selected)' : (emph ? 'rgba(59,130,246,0.9)' : 'var(--edge-stroke)')}" stroke-width="${selected ? '2.25' : ((relatedToSelection || relatedToHover) ? '1.9' : '1') }" stroke-dasharray="5 4" fill="none" marker-end="url(#${emph ? 'arrow-edge-selected' : 'arrow-edge'})" opacity="${emph ? '0.96' : '0.56'}"/>
      </g>`;
    }
  }

  // Rule→object dashed lines
  if (app.visibility.rule) {
    for (const rule of app.rules) {
      if (!rule.targetObjectId) continue;
      const tgtObj = app.objects.find(o => o.id === rule.targetObjectId);
      if (!tgtObj) continue;
      const path = calcConnectionPath(rule, tgtObj, true);
      const selected = app.virtualSelection && app.virtualSelection.kind === 'rule-target' && app.virtualSelection.ownerId === rule.id;
      const relatedToSelection = app.selection === rule.id || app.selection === tgtObj.id;
      const relatedToHover = app.hoverId === rule.id || app.hoverId === tgtObj.id;
      const emph = selected || relatedToSelection || relatedToHover;
      paths += `<g style="pointer-events:all" onclick="event.stopPropagation();selectVirtualConnection('rule-target','${rule.id}')">
        <path class="conn-hit" d="${path}"/>
        <path d="${path}" stroke="${selected ? 'var(--edge-stroke-selected)' : (emph ? 'rgba(59,130,246,0.9)' : 'var(--edge-stroke)')}" stroke-width="${selected ? '2.25' : ((relatedToSelection || relatedToHover) ? '1.9' : '1') }" stroke-dasharray="5 4" fill="none" marker-end="url(#${emph ? 'arrow-edge-selected' : 'arrow-edge'})" opacity="${emph ? '0.96' : '0.56'}"/>
      </g>`;
    }
  }

  svg.innerHTML = paths;
}

function calcConnectionPath(src, tgt, simple) {
  const best = chooseBestAnchors(src, tgt);
  const sx = best.sx, sy = best.sy, tx = best.tx, ty = best.ty;
  const pdx = best.dx;
  const pdy = best.dy;
  const dist = best.dist || 1;

  const sameGroup = !simple && src.type === 'object' && tgt.type === 'object' && src.groupId && tgt.groupId && src.groupId === tgt.groupId;
  const nearAligned = (Math.abs(pdx) < 26 || Math.abs(pdy) < 26);
  const tooClose = dist < (simple ? 86 : 96);
  const useArc = simple ? (nearAligned || tooClose) : !sameGroup;

  if (!useArc) {
    return `M${sx},${sy} L${tx},${ty}`;
  }

  const mx = (sx + tx) / 2;
  const my = (sy + ty) / 2;
  const nx = -pdy / dist;
  const ny = pdx / dist;
  const bendBase = simple ? 0.08 : 0.12;
  const bend = sameGroup
    ? Math.max(8, Math.min(18, dist * 0.07))
    : Math.max(simple ? 10 : 12, Math.min(simple ? 22 : 28, dist * bendBase));
  const dir = (pdx >= 0 ? 1 : -1) * (pdy >= 0 ? 1 : -1);
  const cx = mx + nx * bend * dir;
  const cy = my + ny * bend * dir;
  return `M${sx},${sy} Q${cx},${cy} ${tx},${ty}`;
}

function getPathMidpoint(src, tgt) {
  const srcDom = document.querySelector(`[data-id="${src.id}"]`);
  const tgtDom = document.querySelector(`[data-id="${tgt.id}"]`);
  const sw = srcDom ? srcDom.offsetWidth : 210;
  const sh = srcDom ? srcDom.offsetHeight : 80;
  const tw = tgtDom ? tgtDom.offsetWidth : 210;
  const th = tgtDom ? tgtDom.offsetHeight : 80;
  return {
    x: (src.x + sw / 2 + tgt.x + tw / 2) / 2,
    y: (src.y + sh / 2 + tgt.y + th / 2) / 2
  };
}
