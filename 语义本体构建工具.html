function applyCanvasTransform() {
  const world = document.getElementById('canvas-world');
  world.style.transform = `translate(${app.canvas.panX}px, ${app.canvas.panY}px) scale(${app.canvas.scale})`;
  document.getElementById('zoom-text').textContent = Math.round(app.canvas.scale * 100) + '%';
}

function onNodeMouseDown(e, id) {
  if (e.target.classList.contains('node-port')) return;
  if (app.linkMode.active) { handleLinkModeClick(id); return; }
  e.stopPropagation();
  const el = findElement(id);
  if (!el) return;
  app.drag = {
    active: true, type: 'node', id,
    startX: e.clientX, startY: e.clientY,
    elStartX: el.x, elStartY: el.y,
    moved: false
  };
  if (app.forceLayout.enabled) {
    app.forceLayout.anchorId = id;
    app.forceLayout.dragPin = true;
    app.forceLayout.phase = 'dragging';
    // 拖拽时只做局部增强，避免整图被强力扰动
    app.forceLayout.burstUntil = performance.now() + 140;
    app.forceLayout.settleFrames = 0;
    if (!app.forceLayout.velocities[id]) app.forceLayout.velocities[id] = { vx: 0, vy: 0 };
    app.forceLayout.velocities[id].vx = 0;
    app.forceLayout.velocities[id].vy = 0;
    if (!app.forceLayout.timer) startForceSimulation();
  }
  selectElement(id, false);
}

function onNodeClick(e, id) {
  if (app.linkMode.active) { handleLinkModeClick(id); e.stopPropagation(); return; }
  e.stopPropagation();
  if (app.suppressClick.id === id && performance.now() < app.suppressClick.until) {
    app.suppressClick = { id: null, until: 0 };
    return;
  }
  // 单击只做选择与高亮，不触发任何物理扰动
  selectElement(id, true);
}

function onPortMouseDown(e, ownerId, port) {
  e.stopPropagation();
  e.preventDefault();
  if (!app.editMode) return;
  selectElement(ownerId, false);
  app.connecting = { active: true, sourceId: ownerId, sourcePort: port };
}

function initCanvasEvents() {
  const vp = document.getElementById('canvas-viewport');

  vp.addEventListener('mousedown', (e) => {
    if (e.target.closest('.canvas-node') || e.target.closest('#connections-svg g')) return;
    if (app.linkMode.active) { cancelLinkMode(); return; }
    app.drag = { active: true, type: 'pan', startX: e.clientX, startY: e.clientY, elStartX: app.canvas.panX, elStartY: app.canvas.panY, moved: false };
    app.selection = null;
    app.virtualSelection = null;
    document.querySelectorAll('.canvas-node').forEach(n => n.classList.remove('selected'));
    updateConnections();
    hideRightPanel();
    vp.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', (e) => {
    if (app.connecting.active) {
      const vp = document.getElementById('canvas-viewport');
      const rect = vp.getBoundingClientRect();
      const src = findElement(app.connecting.sourceId);
      if (!src) return;
      const p = getPortPoint(src, app.connecting.sourcePort);
      const sx = p.x;
      const sy = p.y;
      const tempSvg = document.getElementById('temp-connection');
      tempSvg.innerHTML = `<line x1="${sx * app.canvas.scale + app.canvas.panX}" y1="${sy * app.canvas.scale + app.canvas.panY}"
        x2="${e.clientX - rect.left}" y2="${e.clientY - rect.top}" class="temp-line"/>`;
      return;
    }
    if (!app.drag.active) return;
    const dx = e.clientX - app.drag.startX;
    const dy = e.clientY - app.drag.startY;
    if (!app.drag.moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) app.drag.moved = true;
    if (app.drag.type === 'pan') {
      app.canvas.panX = app.drag.elStartX + dx;
      app.canvas.panY = app.drag.elStartY + dy;
      applyCanvasTransform();
    } else if (app.drag.type === 'node') {
      const el = findElement(app.drag.id);
      if (!el) return;
      const nextX = app.drag.elStartX + dx / app.canvas.scale;
      const nextY = app.drag.elStartY + dy / app.canvas.scale;
      if (Math.abs(nextX - el.x) > 0.01 || Math.abs(nextY - el.y) > 0.01) app.drag.moved = true;
      el.x = nextX;
      el.y = nextY;
      const dom = document.querySelector(`[data-id="${app.drag.id}"]`);
      if (dom) { dom.style.left = el.x + 'px'; dom.style.top = el.y + 'px'; }
      ensureCanvasWorldSize();
      updateConnections();
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (app.connecting.active) {
      document.getElementById('temp-connection').innerHTML = '';
      const target = document.elementFromPoint(e.clientX, e.clientY);
      const nodeEl = target ? target.closest('.canvas-node') : null;
      if (nodeEl && nodeEl.dataset.id !== app.connecting.sourceId) {
        const targetEl = findElement(nodeEl.dataset.id);
        const sourceEl = findElement(app.connecting.sourceId);
        if (sourceEl && targetEl) {
          if (sourceEl.type === 'object' && targetEl.type === 'object') {
            const name = prompt('请输入链接名称:', '关系_' + (app.links.length + 1));
            if (name) addLinkBetween(sourceEl.id, targetEl.id, name);
          } else if (sourceEl.type === 'action' && targetEl.type === 'object') {
            sourceEl.triggerObjectId = targetEl.id;
            selectElement(sourceEl.id);
            render();
          } else if (sourceEl.type === 'rule' && targetEl.type === 'object') {
            sourceEl.targetObjectId = targetEl.id;
            selectElement(sourceEl.id);
            render();
          }
          if (app.forceLayout.enabled) {
            app.forceLayout.anchorId = sourceEl.id;
            app.forceLayout.burstUntil = performance.now() + 120;
            app.forceLayout.settleFrames = 0;
          }
        }
      }
      app.connecting = { active: false, sourceId: null, sourcePort: null };
      return;
    }
    if (app.drag.type === 'pan') {
      document.getElementById('canvas-viewport').style.cursor = '';
    }
    const wasNodeDrag = app.drag.type === 'node';
    const draggedId = app.drag.id;
    const didMoveNode = wasNodeDrag && app.drag.moved;
    app.drag = { active: false, type: null, id: null, startX: 0, startY: 0, elStartX: 0, elStartY: 0, moved: false };
    if (didMoveNode && draggedId) {
      app.suppressClick = { id: draggedId, until: performance.now() + 220 };
    }
    if (app.forceLayout.enabled) {
      app.forceLayout.dragPin = false;
      if (didMoveNode && draggedId) {
        app.forceLayout.anchorId = draggedId;
        if (!app.forceLayout.velocities[draggedId]) app.forceLayout.velocities[draggedId] = { vx: 0, vy: 0 };
        app.forceLayout.velocities[draggedId].vx = 0;
        app.forceLayout.velocities[draggedId].vy = 0;
        // 松手后短暂微调，然后自动冻结
        app.forceLayout.phase = 'settling';
        app.forceLayout.burstUntil = performance.now() + 90;
        app.forceLayout.settleFrames = 0;
        if (!app.forceLayout.timer) startForceSimulation();
      }
    }
  });

  vp.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.15, Math.min(3, app.canvas.scale * delta));
    const ratio = newScale / app.canvas.scale;
    app.canvas.panX = mouseX - (mouseX - app.canvas.panX) * ratio;
    app.canvas.panY = mouseY - (mouseY - app.canvas.panY) * ratio;
    app.canvas.scale = newScale;
    applyCanvasTransform();
  }, { passive: false });

  vp.addEventListener('click', (e) => {
    if (!e.target.closest('.canvas-node') && !e.target.closest('#connections-svg g')) {
      clearHoverElement();
      hideRightPanel();
    }
  });
}

function zoomIn() { app.canvas.scale = Math.min(3, app.canvas.scale * 1.2); applyCanvasTransform(); }
function zoomOut() { app.canvas.scale = Math.max(0.15, app.canvas.scale / 1.2); applyCanvasTransform(); }
function resetView() { app.canvas.panX = 0; app.canvas.panY = 0; app.canvas.scale = 1; applyCanvasTransform(); }
function fitAll() {
  ensureCanvasWorldSize();
  const els = [...app.objects, ...app.actions, ...app.rules];
  if (els.length === 0) { resetView(); return; }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const el of els) {
    const dom = document.querySelector(`[data-id="${el.id}"]`);
    const w = dom ? dom.offsetWidth : (el.type === 'object' ? 90 : 130);
    const h = dom ? dom.offsetHeight : (el.type === 'object' ? 90 : 46);
    minX = Math.min(minX, el.x);
    minY = Math.min(minY, el.y);
    maxX = Math.max(maxX, el.x + w);
    maxY = Math.max(maxY, el.y + h);
  }
  const vp = document.getElementById('canvas-viewport');
  const pad = 40;
  const w = maxX - minX + pad * 2;
  const h = maxY - minY + pad * 2;
  const scaleX = vp.clientWidth / w;
  const scaleY = vp.clientHeight / h;
  app.canvas.scale = Math.min(scaleX, scaleY, 1.55);
  app.canvas.panX = -(minX - pad) * app.canvas.scale + (vp.clientWidth - w * app.canvas.scale) / 2;
  app.canvas.panY = -(minY - pad) * app.canvas.scale + (vp.clientHeight - h * app.canvas.scale) / 2;
  applyCanvasTransform();
}

function startForceSimulation() {
  if (app.forceLayout.timer) cancelAnimationFrame(app.forceLayout.timer);
  app.forceLayout.settleFrames = 0;
  app.forceLayout.lastTick = performance.now();

  const BASE = {
    repulsion: 7600,
    centralGravity: 0.0038,
    springLength: 102,
    springConstant: 0.044,
    damping: 0.90,
    collisionPadding: 7,
    maxVelocity: 3.6
  };

  const DRAG = {
    repulsion: 11200,
    centralGravity: 0.010,
    springLength: 96,
    springConstant: 0.056,
    damping: 0.88,
    collisionPadding: 6,
    maxVelocity: 4.2
  };

  const allNodes = [...app.objects, ...app.actions, ...app.rules];
  if (!app.forceLayout.velocities) app.forceLayout.velocities = {};
  allNodes.forEach(n => {
    if (!app.forceLayout.velocities[n.id]) app.forceLayout.velocities[n.id] = { vx: 0, vy: 0 };
  });

  function getNodeSize(node) {
    const dom = document.querySelector(`[data-id="${node.id}"]`);
    return {
      w: dom ? dom.offsetWidth : (node.type === 'object' ? 64 : 114),
      h: dom ? dom.offsetHeight : (node.type === 'object' ? 64 : 34)
    };
  }

  function getEdges(nodes) {
    const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
    const edges = [];
    app.links.forEach(l => {
      const src = nodeMap[l.sourceId];
      const tgt = nodeMap[l.targetId];
      if (src && tgt) edges.push({ a: src, b: tgt, weight: 1.25 });
    });
    app.actions.forEach(act => {
      if (act.triggerObjectId) {
        const tgt = nodeMap[act.triggerObjectId];
        if (tgt && nodeMap[act.id]) edges.push({ a: nodeMap[act.id], b: tgt, weight: 0.92 });
      }
    });
    app.rules.forEach(rule => {
      if (rule.targetObjectId) {
        const tgt = nodeMap[rule.targetObjectId];
        if (tgt && nodeMap[rule.id]) edges.push({ a: nodeMap[rule.id], b: tgt, weight: 0.92 });
      }
    });
    return edges;
  }

  function buildAdjacency(nodes, edges) {
    const adj = {};
    nodes.forEach(n => adj[n.id] = new Set());
    edges.forEach(({ a, b }) => {
      adj[a.id]?.add(b.id);
      adj[b.id]?.add(a.id);
    });
    return adj;
  }

  function activePhysics() {
    return app.drag.active && app.drag.type === 'node' ? DRAG : BASE;
  }

  function freezeSimulation() {
    Object.keys(app.forceLayout.velocities).forEach(id => {
      app.forceLayout.velocities[id].vx = 0;
      app.forceLayout.velocities[id].vy = 0;
    });
    app.forceLayout.phase = 'frozen';
    if (app.forceLayout.freezeAfterSettle) {
      if (app.forceLayout.timer) cancelAnimationFrame(app.forceLayout.timer);
      app.forceLayout.timer = null;
    }
  }

  function tick(now) {
    if (!app.forceLayout.enabled) return;
    const nodes = [...app.objects, ...app.actions, ...app.rules];
    if (nodes.length === 0) {
      app.forceLayout.timer = requestAnimationFrame(tick);
      return;
    }

    const cfg = activePhysics();
    const dt = Math.min(1.35, Math.max(0.72, (now - (app.forceLayout.lastTick || now)) / 16.67 || 1));
    app.forceLayout.lastTick = now;
    const stabilizing = now < app.forceLayout.burstUntil || app.drag.active;
    const SUBSTEPS = app.drag.active ? 2 : (stabilizing ? 2 : 1);
    const REPULSION = cfg.repulsion;
    const SPRING_LENGTH = cfg.springLength;
    const SPRING_CONSTANT = cfg.springConstant;
    const CENTRAL_GRAVITY = cfg.centralGravity;
    const DAMPING = cfg.damping;
    const COLLISION_PADDING = cfg.collisionPadding;
    const MAX_V = cfg.maxVelocity;

    const vels = app.forceLayout.velocities;
    const edges = getEdges(nodes);
    const adjacency = buildAdjacency(nodes, edges);

    for (let step = 0; step < SUBSTEPS; step++) {
      let cx = 0, cy = 0;
      nodes.forEach(n => {
        const s = getNodeSize(n);
        cx += n.x + s.w / 2;
        cy += n.y + s.h / 2;
      });
      cx /= nodes.length;
      cy /= nodes.length;

      const forces = {};
      nodes.forEach(n => { forces[n.id] = { fx: 0, fy: 0 }; });

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const sa = getNodeSize(a), sb = getNodeSize(b);
          const ax = a.x + sa.w / 2, ay = a.y + sa.h / 2;
          const bx = b.x + sb.w / 2, by = b.y + sb.h / 2;
          let dx = bx - ax, dy = by - ay;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (!dist || dist < 0.001) {
            dx = (Math.random() - 0.5) * 2;
            dy = (Math.random() - 0.5) * 2;
            dist = Math.sqrt(dx * dx + dy * dy) || 1;
          }
          const nx = dx / dist, ny = dy / dist;
          const sameObjectGroup = a.type === 'object' && b.type === 'object' && (a.groupId || '') && a.groupId === b.groupId;
          const objectCrossGroup = a.type === 'object' && b.type === 'object' && (a.groupId || '') && (b.groupId || '') && a.groupId !== b.groupId;
          const groupDistPad = objectCrossGroup ? 22 : (sameObjectGroup ? -4 : 0);
          const minDist = Math.max((Math.max(sa.w, sa.h) + Math.max(sb.w, sb.h)) * 0.46 + COLLISION_PADDING + groupDistPad, 34);
          const repulseFactor = objectCrossGroup ? 1.42 : (sameObjectGroup ? 0.90 : 1);
          const repulse = (REPULSION * repulseFactor) / Math.max(dist * dist, 48);
          forces[a.id].fx -= nx * repulse;
          forces[a.id].fy -= ny * repulse;
          forces[b.id].fx += nx * repulse;
          forces[b.id].fy += ny * repulse;

          if (dist < minDist) {
            const overlapBoost = objectCrossGroup ? 0.9 : 0.68;
            const overlap = (minDist - dist) * overlapBoost;
            forces[a.id].fx -= nx * overlap;
            forces[a.id].fy -= ny * overlap;
            forces[b.id].fx += nx * overlap;
            forces[b.id].fy += ny * overlap;
          }
        }
      }

      edges.forEach(({ a, b, weight }) => {
        const sa = getNodeSize(a), sb = getNodeSize(b);
        const ax = a.x + sa.w / 2, ay = a.y + sa.h / 2;
        const bx = b.x + sb.w / 2, by = b.y + sb.h / 2;
        let dx = bx - ax, dy = by - ay;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = dx / dist, ny = dy / dist;
        const degreeA = adjacency[a.id]?.size || 0;
        const degreeB = adjacency[b.id]?.size || 0;
        const degreePad = Math.min(18, Math.max(0, Math.max(degreeA, degreeB) - 2) * 2.1);
        const sameObjectGroup = a.type === 'object' && b.type === 'object' && (a.groupId || '') && a.groupId === b.groupId;
        const objectCrossGroup = a.type === 'object' && b.type === 'object' && (a.groupId || '') && (b.groupId || '') && a.groupId !== b.groupId;
        const groupSpringPad = objectCrossGroup ? 24 : (sameObjectGroup ? -10 : 0);
        const springWeight = objectCrossGroup ? Math.max(0.8, weight * 0.92) : (sameObjectGroup ? weight * 1.06 : weight);
        const ideal = SPRING_LENGTH + degreePad + groupSpringPad;
        const springForce = (dist - ideal) * SPRING_CONSTANT * springWeight;
        forces[a.id].fx += nx * springForce;
        forces[a.id].fy += ny * springForce;
        forces[b.id].fx -= nx * springForce;
        forces[b.id].fy -= ny * springForce;
      });

      nodes.forEach(n => {
        const s = getNodeSize(n);
        const nx = n.x + s.w / 2;
        const ny = n.y + s.h / 2;
        const gravityFactor = n.type === 'object' ? 1 : 0.82;
        forces[n.id].fx += (cx - nx) * CENTRAL_GRAVITY * gravityFactor;
        forces[n.id].fy += (cy - ny) * CENTRAL_GRAVITY * gravityFactor;
      });

      const objectGroups = {};
      app.objects.forEach(o => {
        if (!o.groupId) return;
        if (!objectGroups[o.groupId]) objectGroups[o.groupId] = { nodes: [], cx: 0, cy: 0 };
        const s = getNodeSize(o);
        objectGroups[o.groupId].nodes.push(o);
        objectGroups[o.groupId].cx += o.x + s.w / 2;
        objectGroups[o.groupId].cy += o.y + s.h / 2;
      });
      Object.values(objectGroups).forEach(g => {
        if (!g.nodes.length) return;
        g.cx /= g.nodes.length;
        g.cy /= g.nodes.length;
      });
      const groupEntries = Object.entries(objectGroups);
      for (let i = 0; i < groupEntries.length; i++) {
        for (let j = i + 1; j < groupEntries.length; j++) {
          const ga = groupEntries[i][1], gb = groupEntries[j][1];
          let dx = gb.cx - ga.cx, dy = gb.cy - ga.cy;
          let dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const target = 210;
          if (dist < target) {
            const nx = dx / dist, ny = dy / dist;
            const push = (target - dist) * 0.018;
            ga.nodes.forEach(n => {
              forces[n.id].fx -= nx * push;
              forces[n.id].fy -= ny * push;
            });
            gb.nodes.forEach(n => {
              forces[n.id].fx += nx * push;
              forces[n.id].fy += ny * push;
            });
          }
        }
      }

      nodes.forEach(n => {
        const isDragged = app.drag.active && app.drag.type === 'node' && app.drag.id === n.id;
        if (!vels[n.id]) vels[n.id] = { vx: 0, vy: 0 };
        if (isDragged) {
          vels[n.id].vx = 0;
          vels[n.id].vy = 0;
          return;
        }
        vels[n.id].vx = (vels[n.id].vx + forces[n.id].fx * dt) * DAMPING;
        vels[n.id].vy = (vels[n.id].vy + forces[n.id].fy * dt) * DAMPING;
        vels[n.id].vx = Math.max(-MAX_V, Math.min(MAX_V, vels[n.id].vx));
        vels[n.id].vy = Math.max(-MAX_V, Math.min(MAX_V, vels[n.id].vy));
        n.x += vels[n.id].vx;
        n.y += vels[n.id].vy;
      });
    }

    let totalMovement = 0;
    nodes.forEach(n => {
      const dom = document.querySelector(`[data-id="${n.id}"]`);
      if (dom) {
        dom.style.left = n.x + 'px';
        dom.style.top = n.y + 'px';
      }
      const v = vels[n.id] || { vx: 0, vy: 0 };
      totalMovement += Math.abs(v.vx) + Math.abs(v.vy);
    });

    ensureCanvasWorldSize();
    updateConnections();

    if (totalMovement < (stabilizing ? 1.7 : 0.85)) app.forceLayout.settleFrames += 1;
    else app.forceLayout.settleFrames = 0;

    if (!app.drag.active && app.forceLayout.settleFrames > 8) {
      freezeSimulation();
      return;
    }

    app.forceLayout.timer = requestAnimationFrame(tick);
  }

  app.forceLayout.timer = requestAnimationFrame(tick);
}

function stopForceSimulation() {
  if (app.forceLayout.timer) {
    cancelAnimationFrame(app.forceLayout.timer);
    app.forceLayout.timer = null;
  }
  app.forceLayout.velocities = {};
  app.forceLayout.burstUntil = 0;
  app.forceLayout.settleFrames = 0;
  app.forceLayout.anchorId = null;
  app.forceLayout.dragPin = false;
}

function field(label, inputHtml) {
  return `<div class="prop-field"><label class="prop-field-label">${label}</label>${inputHtml}</div>`;
}
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function updateEl(id, key, value) {
  const el = findElement(id);
  if (el) { el[key] = value; render(); }
}
function updateMapping(id, key, value) {
  const obj = app.objects.find(o => o.id === id);
  if (obj) { if (!obj.mapping) obj.mapping = {}; obj.mapping[key] = value; render(); }
}
function addPropToObj(id) {
  const obj = app.objects.find(o => o.id === id);
  if (obj) { obj.properties.push({ name: '新属性', dataType: 'string', required: false }); render(); }
}
function removeObjProp(id, index) {
  const obj = app.objects.find(o => o.id === id);
  if (obj) { obj.properties.splice(index, 1); render(); }
}
function updateObjProp(id, index, key, value) {
  const obj = app.objects.find(o => o.id === id);
  if (obj && obj.properties[index]) { obj.properties[index][key] = value; render(); }
}
function addPropToLink(id) {
  const link = app.links.find(l => l.id === id);
  if (link) { link.properties.push({ name: '新属性', dataType: 'string' }); render(); }
}
function removeLinkProp(id, index) {
  const link = app.links.find(l => l.id === id);
  if (link) { link.properties.splice(index, 1); render(); }
}
function updateLinkProp(id, index, key, value) {
  const link = app.links.find(l => l.id === id);
  if (link && link.properties[index]) { link.properties[index][key] = value; render(); }
}
function updateObjectGroup(id, groupId) {
  const obj = app.objects.find(o => o.id === id);
  if (!obj) return;
  obj.groupId = groupId;
  const g = getGroupById(groupId);
  if (g) obj.color = g.color;
  render();
}
function showGroupManager(focusObjectId = '') {
  openModal(`
    <h3 class="text-lg font-semibold mb-4" style="color:var(--text-primary)">◎ 对象分组管理</h3>
    <div class="mb-4 text-xs" style="color:var(--text-faint)">为对象定义业务分组，并用不同颜色在画布和列表中区分。</div>
    <div class="space-y-2 mb-4">
      ${app.groups.map((g, i) => `
        <div class="prop-attr-row" style="align-items:center;padding:8px 10px">
          <span class="group-swatch" style="background:${g.color};width:20px;height:20px"></span>
          <input class="input py-1.5 text-xs" style="flex:1.5;min-width:0;border:none;background:transparent;padding-left:0" value="${esc(g.name)}" onchange="renameGroup('${g.id}',this.value)">
          <input type="color" class="group-color-input" value="${g.color}" onchange="changeGroupColor('${g.id}',this.value)" title="选择颜色">
          <div class="text-[11px] px-2 py-1 rounded-lg shrink-0" style="background:var(--bg-soft);border:1px solid var(--border-subtle);color:var(--text-muted);min-width:82px;text-align:center">${g.color}</div>
          <button class="text-red-400/70 hover:text-red-400 text-xs px-1 shrink-0" onclick="removeGroup('${g.id}','${focusObjectId}')">✕</button>
        </div>
      `).join('')}
    </div>
    <div class="prop-card mb-4">
      <div class="prop-field">
        <label class="prop-field-label">新增分组</label>
        <div class="flex gap-2 items-center">
          <input id="new-group-name" class="input" placeholder="如：主数据对象、交易对象、档案对象">
          <input id="new-group-color" type="color" class="group-color-input" value="${app.groupPalette[0]}" title="选择分组颜色" style="width:42px;height:38px">
          <div id="new-group-color-text" class="text-[11px] px-2 py-1.5 rounded-lg shrink-0" style="background:var(--bg-soft);border:1px solid var(--border-subtle);color:var(--text-muted);min-width:82px;text-align:center">${app.groupPalette[0]}</div>
        </div>
      </div>
      <div class="flex gap-2 flex-wrap">
        ${app.groupPalette.map(c => `<button class="group-swatch" style="background:${c};width:22px;height:22px;cursor:pointer" onclick="pickNewGroupColor('${c}')" title="${c}"></button>`).join('')}
      </div>
      <button class="btn btn-primary text-xs mt-3" onclick="createGroup('${focusObjectId}')">新增分组</button>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-ghost flex-1 text-xs" onclick="closeModal()">关闭</button>
    </div>
  `);
  const newColorInput = document.getElementById('new-group-color');
  if (newColorInput) {
    newColorInput.addEventListener('input', e => {
      const t = document.getElementById('new-group-color-text');
      if (t) t.textContent = e.target.value;
    });
  }
}
function createGroup(focusObjectId = '') {
  const name = document.getElementById('new-group-name')?.value?.trim();
  const color = document.getElementById('new-group-color')?.value || app.groupPalette[0];
  if (!name) return;
  const g = { id: uid(), name, color };
  app.groups.push(g);
  if (focusObjectId) {
    const obj = app.objects.find(o => o.id === focusObjectId);
    if (obj) { obj.groupId = g.id; obj.color = g.color; }
  }
  showGroupManager(focusObjectId);
  render();
}
function pickNewGroupColor(color) {
  const input = document.getElementById('new-group-color');
  const text = document.getElementById('new-group-color-text');
  if (input) input.value = color;
  if (text) text.textContent = color;
}
function renameGroup(groupId, name) {
  const g = getGroupById(groupId);
  if (!g) return;
  g.name = name || g.name;
  render();
}
function changeGroupColor(groupId, color) {
  const g = getGroupById(groupId);
  if (!g) return;
  g.color = color;
  app.objects.forEach(o => { if (o.groupId === groupId) o.color = color; });
  render();
  const modal = document.querySelector('#modal-container .modal-overlay');
  if (modal) {
    const currentFocus = app.selection && app.objects.some(o => o.id === app.selection) ? app.selection : '';
    showGroupManager(currentFocus);
  }
}
function removeGroup(groupId, focusObjectId = '') {
  if (app.groups.length <= 1) {
    alert('至少保留一个分组');
    return;
  }
  const g = getGroupById(groupId);
  if (!g) return;
  const fallback = app.groups.find(x => x.id !== groupId);
  app.objects.forEach(o => {
    if (o.groupId === groupId) {
      o.groupId = fallback?.id || '';
      o.color = fallback?.color || '#3b82f6';
    }
  });
  app.groups = app.groups.filter(x => x.id !== groupId);
  render();
  showGroupManager(focusObjectId);
}

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement?.tagName;
  const editing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || document.activeElement?.isContentEditable;
  if (editing) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (app.selection || app.virtualSelection) {
      e.preventDefault();
      deleteSelected();
    }
  }
});

function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const format = document.getElementById('import-format').value;
  const reader = new FileReader();
  reader.onload = (e) => { importData(format, e.target.result); closeModal(); };
  reader.readAsText(file);
  input.value = '';
}

function handleImportText() {
  const text = document.getElementById('import-text').value.trim();
  const format = document.getElementById('import-text-format').value;
  if (!text) return;
  importData(format, text);
  closeModal();
}

function importData(format, text) {
  try {
    if (format === 'json') {
      const data = JSON.parse(text);
      if (data.groups) app.groups = data.groups;
      if (data.groupPalette) app.groupPalette = data.groupPalette;
      if (data.objects) app.objects = data.objects;
      if (data.links) app.links = data.links;
      if (data.actions) app.actions = data.actions;
      if (data.rules) app.rules = data.rules;
      normalizeAllImportedData();
      render();
      requestAnimationFrame(() => requestAnimationFrame(() => normalizeObjectCircles()));
      addAIMsg('system', `✅ JSON 导入成功！分组:${app.groups.length} 对象:${app.objects.length} 链接:${app.links.length} 动作:${app.actions.length} 规则:${app.rules.length}`);
    } else if (format === 'csv') {
      importCSV(text);
    } else if (format === 'owl') {
      importOWL(text);
    }
  } catch (err) {
    alert('导入失败: ' + err.message);
  }
}

function importCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) { alert('CSV 至少需要表头和一行数据'); return; }
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  let targetObj = null;
  if (app.selection) targetObj = app.objects.find(o => o.id === app.selection);
  if (!targetObj && app.objects.length > 0) {
    const name = prompt('请输入要导入实例的对象名称:', app.objects[0].name);
    targetObj = app.objects.find(o => o.name === name);
  }
  if (!targetObj) {
    targetObj = normalizeObjectData(addObject(headers[0] + '_对象'));
    targetObj.properties = headers.map(h => ({ name: h, dataType: 'string', required: false }));
  }
  const instances = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    const instance = {};
    headers.forEach((h, j) => { instance[h] = vals[j] || ''; });
    instances.push(instance);
  }
  targetObj.instances = [...targetObj.instances, ...instances];
  render();
  addAIMsg('system', `✅ CSV 导入成功！已向 "${targetObj.name}" 添加 ${instances.length} 条实例`);
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (const ch of line) {
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += ch; }
  }
  result.push(current.trim());
  return result;
}

function importOWL(text) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/xml');
  const classes = doc.querySelectorAll('Class, owl\\:Class');
  let yPos = 100;
  const classMap = {};
  classes.forEach((cls, i) => {
    const about = cls.getAttribute('rdf:about') || cls.getAttribute('rdf:ID') || '';
    const name = about.split('#').pop() || about.split('/').pop() || '类_' + i;
    const label = cls.querySelector('label, rdfs\\:label');
    const obj = normalizeObjectData(addObject(label?.textContent || name, 100 + (i % 3) * 300, yPos + Math.floor(i / 3) * 200));
    classMap[about] = obj.id;
  });
  const objProps = doc.querySelectorAll('ObjectProperty, owl\\:ObjectProperty');
  objProps.forEach(prop => {
    const about = prop.getAttribute('rdf:about') || '';
    const name = about.split('#').pop() || about.split('/').pop();
    const domain = prop.querySelector('domain, rdfs\\:domain');
    const range = prop.querySelector('range, rdfs\\:range');
    const domainRef = domain?.getAttribute('rdf:resource') || '';
    const rangeRef = range?.getAttribute('rdf:resource') || '';
    if (classMap[domainRef] && classMap[rangeRef]) {
      addLinkBetween(classMap[domainRef], classMap[rangeRef], name);
    }
  });
  const dataProps = doc.querySelectorAll('DatatypeProperty, owl\\:DatatypeProperty');
  dataProps.forEach(prop => {
    const about = prop.getAttribute('rdf:about') || '';
    const name = about.split('#').pop() || about.split('/').pop();
    const domain = prop.querySelector('domain, rdfs\\:domain');
    const domainRef = domain?.getAttribute('rdf:resource') || '';
    if (classMap[domainRef]) {
      const obj = app.objects.find(o => o.id === classMap[domainRef]);
      if (obj) obj.properties.push({ name, dataType: 'string', required: false });
    }
  });
  render();
  addAIMsg('system', `✅ OWL 导入成功！解析了 ${classes.length} 个类, ${objProps.length} 个对象属性, ${dataProps.length} 个数据属性`);
}

function exportJSON() {
  const data = {
    groups: app.groups,
    groupPalette: app.groupPalette,
    objects: app.objects,
    links: app.links,
    actions: app.actions,
    rules: app.rules,
    version: '1.0',
    exportedAt: new Date().toISOString()
  };
  downloadFile('ontology.json', JSON.stringify(data, null, 2), 'application/json');
  closeModal();
}

function exportCSV() {
  let csv = '';
  for (const obj of app.objects) {
    if (obj.instances.length === 0) continue;
    const headers = obj.properties.map(p => p.name);
    csv += `# ${obj.name}\n`;
    csv += headers.join(',') + '\n';
    for (const inst of obj.instances) {
      csv += headers.map(h => `"${String(inst[h] || '').replace(/"/g, '""')}"`).join(',') + '\n';
    }
    csv += '\n';
  }
  if (!csv) csv = '# 暂无实例数据\n';
  downloadFile('ontology_instances.csv', csv, 'text/csv');
  closeModal();
}

function exportOWL() {
  const baseURI = 'http://ontology.example.org/ola#';
  let owl = `<?xml version="1.0" encoding="UTF-8"?>
<rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
         xmlns:rdfs="http://www.w3.org/2000/01/rdf-schema#"
         xmlns:owl="http://www.w3.org/2002/07/owl#"
         xmlns:xsd="http://www.w3.org/2001/XMLSchema#"
         xmlns:ola="${baseURI}">

  <owl:Ontology rdf:about="${baseURI}">
    <rdfs:label>OLA 本体导出</rdfs:label>
    <rdfs:comment>由 OLA 本体构建工具生成</rdfs:comment>
  </owl:Ontology>\n\n`;

  for (const obj of app.objects) {
    owl += `  <owl:Class rdf:about="${baseURI}${encodeURIComponent(obj.name)}">
    <rdfs:label>${obj.name}</rdfs:label>
    ${obj.description ? `<rdfs:comment>${obj.description}</rdfs:comment>` : ''}
  </owl:Class>\n\n`;
    for (const prop of obj.properties) {
      const xsdType = { string:'string',integer:'integer',float:'float',boolean:'boolean',date:'date',datetime:'dateTime',text:'string',json:'string' }[prop.dataType] || 'string';
      owl += `  <owl:DatatypeProperty rdf:about="${baseURI}${encodeURIComponent(obj.name)}_${encodeURIComponent(prop.name)}">
    <rdfs:label>${prop.name}</rdfs:label>
    <rdfs:domain rdf:resource="${baseURI}${encodeURIComponent(obj.name)}"/>
    <rdfs:range rdf:resource="http://www.w3.org/2001/XMLSchema#${xsdType}"/>
  </owl:DatatypeProperty>\n\n`;
    }
  }
  for (const link of app.links) {
    const src = app.objects.find(o => o.id === link.sourceId);
    const tgt = app.objects.find(o => o.id === link.targetId);
    if (!src || !tgt) continue;
    owl += `  <owl:ObjectProperty rdf:about="${baseURI}${encodeURIComponent(link.name)}">
    <rdfs:label>${link.name}</rdfs:label>
    <rdfs:domain rdf:resource="${baseURI}${encodeURIComponent(src.name)}"/>
    <rdfs:range rdf:resource="${baseURI}${encodeURIComponent(tgt.name)}"/>
    ${link.description ? `<rdfs:comment>${link.description}</rdfs:comment>` : ''}
  </owl:ObjectProperty>\n\n`;
  }
  owl += '</rdf:RDF>';
  downloadFile('ontology.owl', owl, 'application/rdf+xml');
  closeModal();
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function showInstanceModal() {
  const sel = app.selection ? app.objects.find(o => o.id === app.selection) : null;
  if (sel) { showInstanceModalFor(sel.id); return; }
  if (app.objects.length === 0) { alert('请先创建对象类型'); return; }
  showInstanceModalFor(app.objects[0].id);
}

function showInstanceModalFor(objId) {
  const obj = app.objects.find(o => o.id === objId);
  if (!obj) return;
  const headers = obj.properties.map(p => p.name);
  let tableHtml = '';
  if (obj.instances.length > 0) {
    tableHtml = `<div class="max-h-64 overflow-auto mb-3">
      <table class="data-table"><thead><tr><th>#</th>${headers.map(h => `<th>${h}</th>`).join('')}<th>操作</th></tr></thead><tbody>
      ${obj.instances.map((inst, i) => `<tr>
        <td style="color:var(--text-faint)">${i + 1}</td>
        ${headers.map(h => `<td>${esc(String(inst[h] || ''))}</td>`).join('')}
        <td><button class="text-red-400 hover:text-red-300 text-xs" onclick="removeInstance('${objId}',${i})">✕</button></td>
      </tr>`).join('')}
      </tbody></table>
    </div>`;
  } else {
    tableHtml = `<div class="text-center py-6 text-xs mb-3" style="color:var(--text-ghost)">暂无实例数据</div>`;
  }

  openModal(`
    <h3 class="text-lg font-semibold mb-1" style="color:var(--text-primary)">📋 实例数据</h3>
    <div class="flex items-center gap-2 mb-4">
      <select class="input text-xs w-48" onchange="closeModal();showInstanceModalFor(this.value)">
        ${app.objects.map(o => `<option value="${o.id}" ${o.id === objId ? 'selected' : ''}>${o.name} (${o.instances.length})</option>`).join('')}
      </select>
      <span class="text-xs" style="color:var(--text-faint)">${obj.instances.length} 条记录</span>
    </div>
    ${tableHtml}
    <div class="flex gap-2 mb-3">
      <button class="btn btn-success text-xs flex-1" onclick="addInstanceRow('${objId}')">+ 添加实例</button>
      <button class="btn btn-ghost text-xs flex-1" onclick="importInstanceCSV('${objId}')">导入 CSV</button>
      <button class="btn btn-ghost text-xs flex-1" onclick="exportInstanceCSV('${objId}')">导出 CSV</button>
    </div>
    <button class="btn btn-ghost text-xs w-full" onclick="closeModal()">关闭</button>
  `);
}

function addInstanceRow(objId) {
  const obj = app.objects.find(o => o.id === objId);
  if (!obj) return;
  const inst = {};
  obj.properties.forEach(p => { inst[p.name] = ''; });
  obj.instances.push(inst);
  closeModal();
  showInstanceModalFor(objId);
  render();
}

function removeInstance(objId, idx) {
  const obj = app.objects.find(o => o.id === objId);
  if (obj) { obj.instances.splice(idx, 1); closeModal(); showInstanceModalFor(objId); render(); }
}

function importInstanceCSV(objId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.csv';
  input.onchange = () => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const obj = app.objects.find(o => o.id === objId);
      if (!obj) return;
      const lines = e.target.result.split('\n').filter(l => l.trim());
      if (lines.length < 2) return;
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        const inst = {};
        headers.forEach((h, j) => { inst[h] = vals[j] || ''; });
        obj.instances.push(inst);
      }
      closeModal(); showInstanceModalFor(objId); render();
      addAIMsg('system', `✅ 已导入 ${lines.length - 1} 条实例到 "${obj.name}"`);
    };
    reader.readAsText(input.files[0]);
  };
  input.click();
}

function exportInstanceCSV(objId) {
  const obj = app.objects.find(o => o.id === objId);
  if (!obj || obj.instances.length === 0) { alert('无实例数据'); return; }
  const headers = obj.properties.map(p => p.name);
  let csv = headers.join(',') + '\n';
  for (const inst of obj.instances) {
    csv += headers.map(h => `"${String(inst[h] || '').replace(/"/g, '""')}"`).join(',') + '\n';
  }
  downloadFile(`${obj.name}_实例数据.csv`, csv, 'text/csv');
}

function addAIMsg(role, text) {
  if (app.aiBatchMode) {
    app.aiBatchBuffer.push({ role, text, time: new Date().toLocaleTimeString() });
    return;

function recoverAICmdsFromTruncatedText(text) {
  const src = String(text || '');
  if (!src) return null;
  const objs = [];
  let depth = 0;
  let start = -1;
  let inString = false;
  let quote = '';
  let escape = false;
  for (let i = 0; i < src.length; i++) {
    const ch = src[i];
    if (inString) {
      if (escape) { escape = false; continue; }
      if (ch === '\\') { escape = true; continue; }
      if (ch === quote) { inString = false; quote = ''; }
      continue;
    }
    if (ch === '"' || ch === "'") {
      inString = true;
      quote = ch;
      continue;
    }
    if (ch === '{') {
      if (depth === 0) start = i;
      depth++;
      continue;
    }
    if (ch === '}') {
      depth--;
      if (depth === 0 && start >= 0) {
        const candidate = src.slice(start, i + 1);
        try {
          const parsed = JSON.parse(candidate);
          if (parsed && typeof parsed === 'object' && parsed.cmd) objs.push(parsed);
        } catch (e) {}
        start = -1;
      }
    }
  }
  return objs.length ? objs : null;
}

function parseLineSeparatedJSONCommands(text) {
  const lines = String(text || '').split(/\n+/).map(s => s.trim()).filter(Boolean);
  const cmds = [];
  for (const line of lines) {
    if (!line.startsWith('{') || !line.endsWith('}')) continue;
    try {
      const parsed = JSON.parse(line);
      if (parsed && typeof parsed === 'object' && parsed.cmd) cmds.push(parsed);
    } catch (e) {}
  }
  return cmds.length ? cmds : null;
}

function parseAICmdsFromText(text, depth = 0) {
  if (!text || depth > 3) return null;
  const trimmed = String(text).trim();
  if (!trimmed) return null;

  const fenced = trimmed.match(/```json\s*([\s\S]*?)```/i) || trimmed.match(/```\s*([\s\S]*?)```/i);
  if (fenced) {
    const parsed = parseAICmdsFromText(fenced[1], depth + 1);
    if (parsed) return parsed;
  }

  try {
    const parsed = JSON.parse(trimmed);
    if (Array.isArray(parsed) && parsed.every(item => item && typeof item === 'object')) {
      if (parsed.every(item => item.cmd)) return parsed;
      if (parsed.choices || parsed.message || parsed.object) {
        const inner = extractAIReplyText(parsed) || extractAIReasoningText(parsed);
        return parseAICmdsFromText(inner, depth + 1);
      }
    }
    if (parsed && typeof parsed === 'object') {
      if (parsed.cmd) return [parsed];
      if (parsed.choices || parsed.message || parsed.object) {
        const inner = extractAIReplyText(parsed) || extractAIReasoningText(parsed);
        return parseAICmdsFromText(inner, depth + 1);
      }
    }
  } catch (e) {}

  const jsonArrayMatch = trimmed.match(/\[[\s\S]*\]/);
  if (jsonArrayMatch) {
    try {
      const parsed = JSON.parse(jsonArrayMatch[0]);
      if (Array.isArray(parsed) && parsed.every(item => item && item.cmd)) return parsed;
    } catch (e) {}
  }

  const jsonObjectMatch = trimmed.match(/\{[\s\S]*\}/);
  if (jsonObjectMatch) {
    try {
      const parsed = JSON.parse(jsonObjectMatch[0]);
      if (parsed?.cmd) return [parsed];
      if (parsed?.choices || parsed?.message || parsed?.object) {
        const inner = extractAIReplyText(parsed) || extractAIReasoningText(parsed);
        return parseAICmdsFromText(inner, depth + 1);
      }
    } catch (e) {}
  }

  const lineParsed = parseLineSeparatedJSONCommands(trimmed);
  if (lineParsed) return lineParsed;

  return recoverAICmdsFromTruncatedText(trimmed);
}

        role: 'system',
        content: '你是语义本体构建助手。每次只返回一行命令，不要 JSON，不要 Markdown，不要解释，不要分析。只允许以下格式之一：DONE；OBJ|对象名；PROP|对象名|属性名|数据类型|false；LINK|源对象|关系名|目标对象|多对一；ACTION|动作名|对象名|创建|条件|操作；RULE|规则名|对象名|验证|表达式；DEL|元素名。所有名称必须中文。'
      },
      {
        role: 'user',
        content: `需求：${text}\n对象：${summarizeNames(app.objects, summaryLimit)}\n链接：${summarizeNames(app.links.map(l => ({ name: l.name })), summaryLimit)}\n动作：${summarizeNames(app.actions, summaryLimit)}\n规则：${summarizeNames(app.rules, summaryLimit)}\n已执行：${executedText}\n请只返回下一行最优先命令；如果无需继续，返回 DONE。`
      }
    ],
    temperature: 0,
    max_tokens: localMode ? 96 : 128
  };
}

function parseAINextCommandDSL(text) {
  const trimmed = String(text || '').trim();
  if (!trimmed) return null;
  const fenced = trimmed.match(/```[a-zA-Z]*\s*([\s\S]*?)```/i);
  if (fenced) return parseAINextCommandDSL(fenced[1]);
  const firstLine = trimmed.split(/\n+/).map(s => s.trim()).find(Boolean) || '';
  const line = firstLine.replace(/[，]/g, ',').trim();
  if (!line) return null;
  if (/^DONE$/i.test(line)) return { done: true, command: null };

  const parts = line.split('|').map(s => s.trim());
  const head = (parts[0] || '').toUpperCase();
  if (head === 'OBJ' || head === 'OBJECT' || parts[0] === '对象') {
    if (parts[1]) return { done: false, command: { cmd: 'createObject', name: parts[1], properties: [] } };
  }
  if (head === 'PROP' || head === 'PROPERTY' || parts[0] === '属性') {
    if (parts[1] && parts[2]) {
      return { done: false, command: { cmd: 'addProperty', object: parts[1], name: parts[2], dataType: parts[3] || 'string', required: String(parts[4] || 'false').toLowerCase() === 'true' } };
    }
  }
  if (head === 'LINK' || parts[0] === '链接' || parts[0] === '关系') {
    if (parts[1] && parts[2] && parts[3]) {
      return { done: false, command: { cmd: 'createLink', source: parts[1], name: parts[2], target: parts[3], cardinality: parts[4] || '多对一' } };
    }
  }
  if (head === 'ACTION' || parts[0] === '动作') {
    if (parts[1] && parts[2]) {
      return { done: false, command: { cmd: 'createAction', name: parts[1], triggerObject: parts[2], triggerEvent: parts[3] || '创建', conditions: parts[4] || '', operations: parts[5] || '' } };
    }
  }
  if (head === 'RULE' || parts[0] === '规则') {
    if (parts[1] && parts[2]) {
      return { done: false, command: { cmd: 'createRule', name: parts[1], targetObject: parts[2], ruleType: parts[3] || '验证', expression: parts[4] || '' } };
    }
  }
  if (head === 'DEL' || head === 'DELETE' || parts[0] === '删除') {
    if (parts[1]) return { done: false, command: { cmd: 'deleteElement', name: parts[1] } };
  }
  return null;
}

function parseAINextCommand(text) {
  const trimmed = String(text || '').trim();
  if (!trimmed) return null;
  try {
    const parsed = JSON.parse(trimmed);
    if (parsed && typeof parsed === 'object') {
      if (parsed.done === true) return { done: true, command: null };
      if (parsed.done === false && parsed.command && parsed.command.cmd) return { done: false, command: parsed.command };
      if (parsed.cmd) return { done: false, command: parsed };
    }
  } catch (e) {}

  const fenced = trimmed.match(/```json\s*([\s\S]*?)```/i) || trimmed.match(/```\s*([\s\S]*?)```/i);
  if (fenced) return parseAINextCommand(fenced[1]);

  const objMatch = trimmed.match(/\{[\s\S]*\}/);
  if (objMatch) {
    try {
      const parsed = JSON.parse(objMatch[0]);
      if (parsed?.done === true) return { done: true, command: null };
      if (parsed?.done === false && parsed.command?.cmd) return { done: false, command: parsed.command };
      if (parsed?.cmd) return { done: false, command: parsed };
    } catch (e) {}
  }

  const cmds = parseAICmdsFromText(trimmed);
  if (cmds?.length) return { done: false, command: cmds[0] };
  return null;
}

function splitUserNaturalCommands(text) {
  return String(text || '')
    .split(/[\n；;。]+/)
    .map(s => s.trim())
    .filter(Boolean);
}

function parseSimpleUserCommand(line) {
  const text = String(line || '').trim();
  if (!text) return null;

  let m = text.match(/^(?:创建|新建|增加|添加)(?:一个|一条|一项)?对象[:：]?\s*(.+)$/);
  if (m) return { cmd: 'createObject', name: m[1].trim(), properties: [] };

  m = text.match(/^(?:创建|新建|增加|添加)(?:一个|一条|一项)?动作[:：]?\s*(.+)$/);
  if (m) return { cmd: 'createAction', name: m[1].trim() };

  m = text.match(/^(?:创建|新建|增加|添加)(?:一个|一条|一项)?规则[:：]?\s*(.+)$/);
  if (m) return { cmd: 'createRule', name: m[1].trim() };

  m = text.match(/^(?:为)?(.+?)(?:添加|增加)(?:一个|一条|一项)?属性[:：]?\s*(.+)$/);
  if (m) return { cmd: 'addProperty', object: m[1].trim(), name: m[2].trim(), dataType: 'string', required: false };

  m = text.match(/^将(.+?)(?:与|和)(.+?)(?:建立|创建|添加)?(?:一条)?关系[:：]?\s*(.+)$/);
  if (m) return { cmd: 'createLink', source: m[1].trim(), target: m[2].trim(), name: m[3].trim(), cardinality: '多对一' };

  m = text.match(/^删除(?:元素|对象|动作|规则|链接)?[:：]?\s*(.+)$/);
  if (m) return { cmd: 'deleteElement', name: m[1].trim() };

  return null;
}

function parseSimpleUserCommands(text) {
  const parts = splitUserNaturalCommands(text);
  const cmds = parts.map(parseSimpleUserCommand).filter(Boolean);
  return cmds.length ? cmds : null;
}

async function executeResolvedAICmds(cmds, sourceLabel = 'AI') {
  if (!cmds || !cmds.length) return false;
  addAIMsg('assistant', `已解析到 ${cmds.length} 条可执行指令，正在创建...`);
  let changed = false;
  let needsFit = false;
  let successCount = 0;
  let skippedCount = 0;
  beginAIBatch();
  try {
    for (let i = 0; i < cmds.length; i++) {
      const cmd = cmds[i];
      const ok = executeAICmd(cmd);
      if (ok) {
        successCount += 1;
        changed = true;
      } else {
        skippedCount += 1;
      }
      needsFit = needsFit || ['createObject', 'createAction', 'createRule'].includes(cmd.cmd);
      if (i > 0 && i % 6 === 0) {
        flushAIBatch();
        await new Promise(resolve => setTimeout(resolve, 0));
        beginAIBatch();
      }
    }
  } finally {
    flushAIBatch();
  }
  if (changed) refreshAfterAIChange({ fit: needsFit });
  addAIMsg('system', changed
    ? `✅ ${sourceLabel}指令处理完成：成功执行 ${successCount} / ${cmds.length} 条${skippedCount ? `，未命中或跳过 ${skippedCount} 条` : ''}`
    : `⚠️ ${sourceLabel}指令已处理，但没有实际写入任何变更。可能原因：对象名称未匹配、属性已存在，或目标不存在。`);
  return changed;
}

async function runAIIterativeBuild(userMsg, options = {}) {
  const localMode = !!options.localMode;
  const executed = [];
  let changed = false;
  let needsFit = false;
  const maxRounds = localMode ? 18 : 12;

  addAIMsg('assistant', '⏳ 正在切换为逐条创建模式...');
  beginAIBatch();
  try {
    for (let round = 0; round < maxRounds; round++) {
      let next = null;
      try {
        const resp = await postAIRequest(
          buildAINextCommandPayload(userMsg, executed, { localMode, compact: localMode }),
          { timeout: localMode ? 180000 : 90000 }
        );
        const reply = extractAIReplyText(resp.data) || extractAIReasoningText(resp.data);
        next = parseAINextCommand(reply);
      } catch (e) {}

      if (!next && localMode) {
        const dslResp = await postAIRequest(
          buildAINextCommandDSLPayload(userMsg, executed, { localMode: true }),
          { timeout: 120000 }
        );
        const dslReply = extractAIReplyText(dslResp.data) || extractAIReasoningText(dslResp.data);
        next = parseAINextCommandDSL(dslReply);
      }

      if (!next) {
        addAIMsg('system', `⚠️ 第 ${round + 1} 轮未解析到可执行单条指令，已停止逐条创建。`);
        break;
      }
      if (next.done || !next.command) {
        addAIMsg('system', `✅ 逐条创建完成，共执行 ${executed.length} 条指令。`);
        break;
      }
      const cmd = next.command;
      const label = cmd.name || cmd.object || cmd.rule || cmd.action || cmd.target || cmd.source || '未命名';
      const sig = JSON.stringify([cmd.cmd, label, cmd.source || '', cmd.target || '', cmd.triggerObject || '', cmd.targetObject || '', cmd.name || '']);
      if (executed.some(x => x.sig === sig)) {
        addAIMsg('system', `ℹ️ 已跳过重复指令：${cmd.cmd} / ${label}`);
        continue;
      }
      const ok = executeAICmd(cmd);
      executed.push({ cmd: cmd.cmd, label, sig });
      if (ok) {
        changed = true;
        needsFit = needsFit || ['createObject', 'createAction', 'createRule'].includes(cmd.cmd);
      }
      if (round > 0 && round % 4 === 0) {
        flushAIBatch();
        await new Promise(resolve => setTimeout(resolve, 0));
        beginAIBatch();
      }
    }
  } finally {
    flushAIBatch();
  }

  if (changed) refreshAfterAIChange({ fit: needsFit });
  if (!executed.length) {
    addAIMsg('system', '⚠️ 已切换为逐条创建模式（含 DSL 单行命令兜底），但模型仍未返回可执行指令。建议缩短背景说明，只保留要创建或修改的对象、关系、动作、规则要求。');
  }
  return executed.length > 0;
}

function buildAIEndpointCandidates(endpoint) {
  const base = String(endpoint || '').trim().replace(/\/+$/, '');
  if (!base) return [];
  if (/\/chat\/completions$/i.test(base)) return [base];
  if (/\/v\d+$/i.test(base)) return [`${base}/chat/completions`];
  return [`${base}/chat/completions`, `${base}/v1/chat/completions`];
}

function explainAIFetchError(err, endpoint) {
  const raw = String(err?.message || err || '未知错误');
  const isHttpsPage = window.location.protocol === 'https:';
  const isHttpApi = /^http:\/\//i.test(endpoint || '');
  if (raw === 'Failed to fetch') {
    if (isHttpsPage && isHttpApi) {
      return '浏览器拦截了 HTTPS 页面访问 HTTP 接口（混合内容）。请将 API 地址改为 HTTPS，或通过同源代理转发该接口。';
    }
    return '浏览器未能成功发起请求，常见原因包括：接口地址不可达、跨域(CORS)未放开、网络不通、证书异常，或服务未启动。';
  }
  if (/aborted|timeout/i.test(raw)) {
    if (isLocalAIEndpoint(endpoint)) {
      return '请求超时。当前是本地模型端点，测试连接只发送极短文本，而正式对话即使已自动切换为轻量/极简/严格 JSON 模式，长提示词仍可能超时。建议把长需求拆成 2~3 次发送，或先要求“只做分析”再要求“只输出 JSON 指令”。';
    }
    return '请求超时。若“测试连接”成功而正式对话超时，通常是因为正式请求上下文更长、模型生成更慢。系统已自动改为轻量上下文重试，或可适当减少上下文规模。';
  }
  if (/接口返回错误 \(400\)/.test(raw)) {
    return '接口返回 400。若这是图片请求，通常表示当前端点或模型不支持多模态图片输入，或不接受当前 image_url/base64 格式。系统已优先尝试压缩图片；若仍失败，请确认该模型支持视觉输入。';
  }
  return raw;
}

async function postAIRequest(payload, options = {}) {
  const endpoint = options.endpoint || app.aiConfig.endpoint;
  const candidates = buildAIEndpointCandidates(endpoint);
  if (!candidates.length) throw new Error('AI 接口地址为空');
  let lastError = null;

  for (const url of candidates) {
    const externalSignal = options.signal || null;
    const controller = new AbortController();
    const noTimeout = options.timeout === 0 || options.timeout === null;
    const timer = noTimeout ? null : setTimeout(() => controller.abort('timeout'), options.timeout || 25000);
    const onExternalAbort = () => controller.abort('user-abort');
    if (externalSignal) {
      if (externalSignal.aborted) controller.abort('user-abort');
      else externalSignal.addEventListener('abort', onExternalAbort, { once: true });
    }
    try {
      const res = await fetch(url, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'application/json',
          ...(app.aiConfig.apiKey ? { 'Authorization': `Bearer ${app.aiConfig.apiKey}` } : {})
        },
        body: JSON.stringify(payload),
        signal: controller.signal
      });
      if (timer) clearTimeout(timer);
      if (externalSignal) externalSignal.removeEventListener('abort', onExternalAbort);

      let data = null;
      const text = await res.text();
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }

      if (!res.ok) {
        const detail = data?.error?.message || data?.message || data?.raw || `HTTP ${res.status}`;
        throw new Error(`接口返回错误 (${res.status}): ${detail}`);
      }
      return { url, data };
    } catch (err) {
      if (timer) clearTimeout(timer);
      if (externalSignal) externalSignal.removeEventListener('abort', onExternalAbort);
      if (err?.name === 'AbortError') {
        if (externalSignal && externalSignal.aborted) {
          const abortErr = new Error('用户已中止请求');
          abortErr.userAborted = true;
          throw abortErr;
        }
        lastError = new Error('请求超时');
      } else {
        lastError = err;
      }
    }
  }
  throw lastError || new Error('请求失败');
}

async function testAIConnection() {
  const endpoint = document.getElementById('ai-endpoint')?.value?.trim().replace(/\/+$/, '') || app.aiConfig.endpoint;
  const model = document.getElementById('ai-model')?.value?.trim() || app.aiConfig.model;
  const apiKey = document.getElementById('ai-key')?.value ?? app.aiConfig.apiKey;
  const old = { ...app.aiConfig };
  app.aiConfig = { endpoint, model, apiKey };
  addAIMsg('system', `🔌 正在测试 AI 连接：${endpoint}`);
  try {
    const payload = {
      model,
      messages: [{ role: 'user', content: '请回复：连接测试成功' }],
      temperature: 0,
      max_tokens: 32
    };
    const { url, data } = await postAIRequest(payload, { endpoint, timeout: 12000 });
    const reply = data?.choices?.[0]?.message?.content || data?.message?.content || '连接成功';
    addAIMsg('system', `✅ 连接测试成功\n接口: ${url}\n模型: ${model}\n返回: ${reply}`);
  } catch (err) {
    addAIMsg('system', `❌ 连接测试失败：${explainAIFetchError(err, endpoint)}`);
  } finally {
    app.aiConfig = old;
  }
}

async function sendAI() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if (!msg) return;
  if (app.currentAIController) {
    addAIMsg('system', '⚠️ 当前已有 AI 请求在进行中，请先点击红色按钮中止后再发送。');
    return;
  }
  input.value = '';
  addAIMsg('user', msg);

  if (!app.aiConfig.endpoint) {
    addAIMsg('system', '⚠️ 请先配置 AI 模型（点击顶部 "AI模型配置" 按钮）');
    return;
  }

  const localMode = isLocalAIEndpoint();
  const heavyLocal = isHeavyLocalPrompt(msg);
  const veryHeavyLocal = isVeryHeavyLocalPrompt(msg);

  if (!app.aiExpanded) toggleAIPanel();

  const simpleCmds = parseSimpleUserCommands(msg);
  if (simpleCmds && simpleCmds.length && !/[场景|分析|补全|根据现有|基于现有|梳理|识别|推断]/.test(msg)) {
    await executeResolvedAICmds(simpleCmds, '本地直解析');
    return;
  }

  addAIMsg('assistant', '⏳ 正在思考...');

  const controller = new AbortController();
  app.currentAIController = controller;
  setAIBusyUI(true);
  const reqOpts = { timeout: 0, signal: controller.signal };

  try {
    let workingMsg = msg;
    // 仅在本地小模型 + 极长输入时才做摘要压缩，避免细节丢失。
    // 非本地模型保留完整原文，依赖更高的 max_tokens 与续写机制处理长输出。
    if (localMode && msg.length > 1500) {
      try {
        removePendingAIThinking();
        addAIMsg('assistant', '⏳ 输入较长，正在先压缩需求摘要...');
        const summaryResp = await postAIRequest({
          model: app.aiConfig.model,
          messages: [
            { role: 'system', content: '你是需求压缩助手。请把用户输入压缩成 180 字以内的本体建模任务摘要，只保留需要新增/修改的对象、关系、动作、规则、属性要求。不要解释。' },
            { role: 'user', content: compactUserPromptForLocal(msg, 1200) }
          ],
          temperature: 0,
          max_tokens: 180
        }, reqOpts);
        const summaryText = (extractAIReplyText(summaryResp.data) || '').trim();
        if (summaryText) workingMsg = summaryText;
        removePendingAIThinking();
        addAIMsg('assistant', '⏳ 需求已压缩，正在继续建模...');
      } catch (e) {
        if (e?.userAborted) throw e;
        removePendingAIThinking();
        addAIMsg('assistant', '⏳ 压缩摘要失败，继续尝试直接建模...');
      }
    }

    let response;
    try {
      response = await postAIRequest(
        buildAIChatPayload(workingMsg, { lightweight: localMode, localMode, compact: localMode, ultraCompact: heavyLocal, veryHeavyLocal }),
        reqOpts
      );
    } catch (err) {
      if (err?.userAborted) throw err;
      const errText = String(err?.message || err || '');
      if (/超时|timeout|aborted/i.test(errText)) {
        removePendingAIThinking();
        addAIMsg('assistant', localMode ? '⏳ 本地模型响应较慢，正在使用极简上下文重试...' : '⏳ 正在使用轻量上下文重试...');
        try {
          response = await postAIRequest(
            buildAIChatPayload(workingMsg, { lightweight: true, localMode, compact: true, ultraCompact: true, veryHeavyLocal }),
            reqOpts
          );
        } catch (retryErr) {
          if (retryErr?.userAborted) throw retryErr;
          const retryText = String(retryErr?.message || retryErr || '');
          if (localMode && /超时|timeout|aborted/i.test(retryText)) {
            removePendingAIThinking();
            addAIMsg('assistant', '⏳ 正在使用严格 JSON 极简模式再次重试...');
            response = await postAIRequest(
              buildAIStrictJSONPayload(workingMsg, { compact: true, ultraCompact: true, veryHeavyLocal }),
              reqOpts
            );
          } else {
            throw retryErr;
          }
        }
      } else {
        throw err;
      }
    }

    let { data, url } = response;
    removePendingAIThinking();
    app.lastAIResolvedUrl = url;

    let reply = extractAIReplyText(data);
    let reasoning = extractAIReasoningText(data);
    let finishReason = getAIFinishReason(data);
    let cmds = parseAICmdsFromText(reply) || parseAICmdsFromText(reasoning);

    if (!cmds && finishReason === 'length') {
      cmds = recoverAICmdsFromTruncatedText(reply) || recoverAICmdsFromTruncatedText(reasoning);
    }

    // 若被截断但已解析到部分指令：先执行它们，再请求续写剩余指令，避免重复创建。
    let totalExecuted = [];
    if (cmds && cmds.length && finishReason === 'length') {
      await executeResolvedAICmds(cmds, 'AI（首批）');
      totalExecuted = totalExecuted.concat(cmds);
      const maxContinue = 6;
      for (let i = 0; i < maxContinue; i++) {
        addAIMsg('assistant', `⏳ 输出被截断，正在请求续写剩余指令（第 ${i + 1} 轮）...`);
        let contResp;
        try {
          contResp = await postAIRequest(
            buildAIContinuationPayload(workingMsg, totalExecuted, { localMode }),
            reqOpts
          );
        } catch (e) {
          if (e?.userAborted) throw e;
          addAIMsg('system', `⚠️ 续写请求失败：${explainAIFetchError(e, app.aiConfig.endpoint)}`);
          break;
        }
        removePendingAIThinking();
        const cReply = extractAIReplyText(contResp.data);
        const cReason = extractAIReasoningText(contResp.data);
        const cFinish = getAIFinishReason(contResp.data);
        let cCmds = parseAICmdsFromText(cReply) || parseAICmdsFromText(cReason);
        if (!cCmds && cFinish === 'length') {
          cCmds = recoverAICmdsFromTruncatedText(cReply) || recoverAICmdsFromTruncatedText(cReason);
        }
        // 去重（基于关键字段签名）
        const seen = new Set(totalExecuted.map(c => cmdSignature(c)));
        const newCmds = (cCmds || []).filter(c => {
          const s = cmdSignature(c);
          if (seen.has(s)) return false;
          seen.add(s);
          return true;
        });
        if (!newCmds.length) {
          addAIMsg('system', `✅ 续写未返回新增指令，分批创建完成（累计 ${totalExecuted.length} 条）。`);
          break;
        }
        await executeResolvedAICmds(newCmds, `AI（续写第 ${i + 1} 轮）`);
        totalExecuted = totalExecuted.concat(newCmds);
        if (cFinish !== 'length') {
          addAIMsg('system', `✅ 分批创建完成（累计 ${totalExecuted.length} 条）。`);
          break;
        }
      }
      return;
    }

    if (!cmds && (finishReason === 'length' || !reply || !String(reply).trim())) {
      addAIMsg('assistant', '⏳ 正在整理建模结果...');
      const strictResp = await postAIRequest(
        buildAIStrictJSONPayload(workingMsg, { compact: localMode, ultraCompact: true, veryHeavyLocal }),
        reqOpts
      );
      removePendingAIThinking();
      data = strictResp.data;
      url = strictResp.url;
      app.lastAIResolvedUrl = url;
      reply = extractAIReplyText(data);
      reasoning = extractAIReasoningText(data);
      finishReason = getAIFinishReason(data);
      cmds = parseAICmdsFromText(reply) || parseAICmdsFromText(reasoning);
      if (!cmds && finishReason === 'length') {
        cmds = recoverAICmdsFromTruncatedText(reply) || recoverAICmdsFromTruncatedText(reasoning);
      }
    }

    if (!cmds && finishReason === 'length') {
      addAIMsg('assistant', '⏳ 模型输出过长，正在按分批创建方式恢复第一批指令...');
      const batchResp = await postAIRequest(
        buildAIRecoveryBatchPayload(workingMsg),
        reqOpts
      );
      removePendingAIThinking();
      data = batchResp.data;
      url = batchResp.url;
      app.lastAIResolvedUrl = url;
      reply = extractAIReplyText(data);
      reasoning = extractAIReasoningText(data);
      finishReason = getAIFinishReason(data);
      cmds = parseAICmdsFromText(reply) || parseAICmdsFromText(reasoning) || recoverAICmdsFromTruncatedText(reply) || recoverAICmdsFromTruncatedText(reasoning);
    }

    if (!cmds && finishReason === 'length') {
      addAIMsg('assistant', '⏳ 继续尝试提取超小批次指令（3-4 条）...');
      const microResp = await postAIRequest(
        buildAIMicroRecoveryPayload(workingMsg),
        reqOpts
      );
      removePendingAIThinking();
      data = microResp.data;
      url = microResp.url;
      app.lastAIResolvedUrl = url;
      reply = extractAIReplyText(data);
      reasoning = extractAIReasoningText(data);
      finishReason = getAIFinishReason(data);
      cmds = parseAICmdsFromText(reply) || parseAICmdsFromText(reasoning) || parseLineSeparatedJSONCommands(reply) || parseLineSeparatedJSONCommands(reasoning) || recoverAICmdsFromTruncatedText(reply) || recoverAICmdsFromTruncatedText(reasoning);
    }

    if (cmds && cmds.length) {
      await executeResolvedAICmds(cmds, 'AI');
      return;
    }

    const visibleReply = String(reply || reasoning || '').trim() || JSON.stringify(data);
    addAIMsg('assistant', visibleReply);
    if (finishReason === 'length') {
      const iterativeOk = await runAIIterativeBuild(workingMsg, { localMode });
      if (!iterativeOk) {
        addAIMsg('system', '⚠️ 本次模型输出已被截断（finish_reason=length）。系统已自动尝试“严格 JSON 整理”“第一批恢复”“超小批次恢复（3-4 条）”“逐条 JSON 创建模式”以及“DSL 单行命令模式”，但模型仍未返回可执行指令。建议缩短背景说明，只保留要新增/修改的对象、关系、动作、规则要求。');
      }
    }
  } catch (err) {
    removePendingAIThinking();
    if (err?.userAborted) {
      addAIMsg('system', '🛑 已中止当前 AI 请求。');
    } else {
      addAIMsg('system', `❌ AI 请求失败：${explainAIFetchError(err, app.aiConfig.endpoint)}\n当前端点：${app.aiConfig.endpoint}\n提示：当前对话已不设超时上限，可随时点击红色按钮手动中止。`);
    }
  } finally {
    if (app.currentAIController === controller) app.currentAIController = null;
    setAIBusyUI(false);
  }
}

function setAIBusyUI(busy) {
  const sendBtn = document.getElementById('ai-send-btn');
  const stopBtn = document.getElementById('ai-stop-btn');
  if (sendBtn) sendBtn.style.display = busy ? 'none' : '';
  if (stopBtn) stopBtn.style.display = busy ? '' : 'none';
}

function stopAI() {
  if (app.currentAIController) {
    try { app.currentAIController.abort('user-abort'); } catch {}
  } else {
    setAIBusyUI(false);
  }
}

function executeAICmd(cmd) {
  try {
    let changed = false;
    switch (cmd.cmd) {
      case 'createObject': {
        const obj = addObject(cmd.name);
        if (cmd.properties) {
          obj.properties = cmd.properties.map(p => ({
            name: p.name, dataType: p.dataType || 'string', required: p.required || false
          }));
        }
        addAIMsg('system', `✅ 已创建对象: ${cmd.name}`);
        changed = true;
        break;
      }
      case 'createLink': {
        const src = findObjectByAIName(cmd.source);
        const tgt = findObjectByAIName(cmd.target);
        if (src && tgt) {
          const link = addLinkBetween(src.id, tgt.id, cmd.name);
          if (cmd.cardinality) link.cardinality = cmd.cardinality;
          addAIMsg('system', `✅ 已创建链接: ${cmd.name} (${src.name} → ${tgt.name})`);
          changed = true;
        } else {
          addAIMsg('system', `⚠️ 找不到源或目标对象: ${cmd.source || '未提供'}, ${cmd.target || '未提供'}`);
        }
        break;
      }
      case 'createAction': {
        const act = addAction(cmd.name);
        const trigObj = findObjectByAIName(cmd.triggerObject);
        if (trigObj) act.triggerObjectId = trigObj.id;
        if (cmd.triggerEvent) act.triggerEvent = cmd.triggerEvent;
        if (cmd.conditions) act.conditions = cmd.conditions;
        if (cmd.operations) act.operations = cmd.operations;
        addAIMsg('system', `✅ 已创建动作: ${cmd.name}${trigObj ? `（绑定对象: ${trigObj.name}）` : ''}`);
        changed = true;
        break;
      }
      case 'bindAction': {
        const act = findActionByAIName(cmd.action);
        const obj = findObjectByAIName(cmd.object);
        if (act && obj) {
          act.triggerObjectId = obj.id;
          if (cmd.triggerEvent) act.triggerEvent = cmd.triggerEvent;
          if (cmd.conditions) act.conditions = cmd.conditions;
          if (cmd.operations) act.operations = cmd.operations;
          addAIMsg('system', `✅ 已绑定动作: ${act.name} → ${obj.name}`);
          changed = true;
        } else {
          addAIMsg('system', `⚠️ 找不到动作或对象: ${cmd.action || '未提供'}, ${cmd.object || '未提供'}`);
        }
        break;
      }
      case 'createRule': {
        const rule = addRule(cmd.name);
        const tgtObj = findObjectByAIName(cmd.targetObject);
        if (tgtObj) rule.targetObjectId = tgtObj.id;
        if (cmd.ruleType) rule.ruleType = cmd.ruleType;
        if (cmd.expression) rule.expression = cmd.expression;
        addAIMsg('system', `✅ 已创建规则: ${cmd.name}${tgtObj ? `（绑定对象: ${tgtObj.name}）` : ''}`);
        changed = true;
        break;
      }
      case 'bindRule': {
        const rule = findRuleByAIName(cmd.rule);
        const obj = findObjectByAIName(cmd.object);
        if (rule && obj) {
          rule.targetObjectId = obj.id;
          if (cmd.ruleType) rule.ruleType = cmd.ruleType;
          if (cmd.expression) rule.expression = cmd.expression;
          addAIMsg('system', `✅ 已绑定规则: ${rule.name} → ${obj.name}`);
          changed = true;
        } else {
          addAIMsg('system', `⚠️ 找不到规则或对象: ${cmd.rule || '未提供'}, ${cmd.object || '未提供'}`);
        }
        break;
      }
      case 'addProperty': {
        const obj = findObjectByAIName(cmd.object);
        if (obj) {
          const exists = (obj.properties || []).some(p => normalizeAIMatchName(p.name) === normalizeAIMatchName(cmd.name));
          if (exists) {
            addAIMsg('system', `ℹ️ ${obj.name} 已存在属性: ${cmd.name}`);
          } else {
            obj.properties.push({ name: cmd.name, dataType: cmd.dataType || 'string', required: cmd.required || false });
            addAIMsg('system', `✅ 已为 ${obj.name} 添加属性: ${cmd.name}`);
            changed = true;
          }
        } else {
          addAIMsg('system', `⚠️ 找不到对象，无法添加属性: ${cmd.object || '未提供'} → ${cmd.name || '未提供属性名'}`);
        }
        break;
      }
      case 'addInstance': {
        const obj = findObjectByAIName(cmd.object);
        if (obj && cmd.data) {
          obj.instances.push(cmd.data);
          addAIMsg('system', `✅ 已为 ${obj.name} 添加实例`);
          changed = true;
        }
        break;
      }
      case 'deleteInstance': {
        const obj = findObjectByAIName(cmd.object);
        if (obj && cmd.where && typeof cmd.where === 'object') {
          const before = obj.instances.length;
          obj.instances = obj.instances.filter(inst => !Object.entries(cmd.where).every(([k, v]) => String(inst[k] ?? '') === String(v)));
          const removed = before - obj.instances.length;
          addAIMsg('system', removed > 0
            ? `✅ 已从 ${cmd.object} 删除 ${removed} 条实例`
            : `⚠️ 在 ${cmd.object} 中未找到匹配实例`);
          changed = removed > 0;
        }
        break;
      }
      case 'deleteElement': {
        const raw = String(cmd.name || '').trim();
        const normalized = normalizeAIMatchName(raw);
        const el = allElements().find(e => e.name === raw)
          || allElements().find(e => normalizeAIMatchName(e.name) === normalized)
          || allElements().find(e => normalizeAIMatchName(e.name).includes(normalized) || normalized.includes(normalizeAIMatchName(e.name)));
        if (el) {
          if (app.selection === el.id) hideRightPanel();
          removeFromCollection(el.id);
          addAIMsg('system', `✅ 已删除元素: ${el.name}`);
          changed = true;
        }
        break;
      }
      case 'query': {
        addAIMsg('system', `🔍 查询: ${cmd.description}`);
        break;
      }
    }
    return changed;
  } catch (err) {
    addAIMsg('system', `⚠️ 执行指令失败: ${err.message}`);
    return false;
  }
}

function openModal(html) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">${html}</div>
    </div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (app.selection) deleteSelected();
  }
  if (e.key === 'Escape') {
    if (app.linkMode.active) cancelLinkMode();
    else { selectElement(null); closeModal(); }
  }
  if (e.key === '1') setView('canvas');
  if (e.key === '2') setView('list');
  if (e.key === 'f' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

function loadDemo() {
  app.objects = [];
  app.links = [];
  app.actions = [];
  app.rules = [];
  app.groups = [];
  app.selection = null;
  app.virtualSelection = null;
  app.expandedNodes = {};
  app.hoverId = null;
  app.forceLayout.anchorId = null;
  app.forceLayout.dragAnchorId = null;

  hideRightPanel();
  render();
  requestAnimationFrame(() => {
    updateConnections();
    ensureCanvasWorldSize();
  });
}

// ============================================================
// INIT
// ============================================================
function init() {
  initCanvasEvents();
  syncVisibilitySwitches();
  syncOpsMenu();
  document.addEventListener('click', closeOpsMenu);
  const opsMenu = document.getElementById('ops-menu');
  if (opsMenu) opsMenu.addEventListener('click', e => e.stopPropagation());
  const viewport = document.getElementById('canvas-viewport');
  if (viewport) viewport.classList.toggle('force-on', !!app.forceLayout.enabled);
  loadDemo();
  if (app.aiConfig.endpoint) {
    document.getElementById('ai-status').textContent = '已配置 ✓';
    document.getElementById('ai-status').style.color = '#10b981';
  }
  renderAIMessages();
}

window.addEventListener('DOMContentLoaded', init);
