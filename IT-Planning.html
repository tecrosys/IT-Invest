        const top = [];
        if (state.dragLink?.start && state.dragLink?.current) {
          const previewPath = getPathData(
            state.dragLink.start,
            state.dragLink.current,
            state.dragLink.sourceAnchor,
            state.dragLink.targetAnchor || getStableTargetAnchor(state.dragLink.sourceId, state.dragLink.current, 'right')
          );
          top.push(`<path class="line-preview" d="${previewPath}" />`);
          top.push(`<circle class="line-dot" cx="${state.dragLink.start.x}" cy="${state.dragLink.start.y}" r="4" />`);
          if (state.dragLink.targetId && state.dragLink.targetAnchor) {
            top.push(`<circle class="line-dot" cx="${state.dragLink.current.x}" cy="${state.dragLink.current.y}" r="4" />`);
          }
        }
        const activeOverlay = els.linesTop.innerHTML;
        els.linesTop.innerHTML = activeOverlay + top.join('');
      }

      function renderLinkStatus() {
        const active = !!(state.dragLink || state.linkingSource);
        els.linkStatus.style.display = active ? 'inline-flex' : 'none';
      }

      function renderBoard() {
        const analysis = getAnalysis();
        const productItems = state.data.itProjects.filter(it => it.kind === 'product');
        const projectItems = state.data.itProjects.filter(it => it.kind !== 'product');
        const totalCapabilities = state.data.capabilityGroups.reduce((sum, group) => sum + group.capabilities.length, 0);
        const totalBudget = getBudgetTotal(state.data.itProjects);
        const productBudget = getBudgetTotal(productItems);
        const projectBudget = getBudgetTotal(projectItems);

        els.board.innerHTML = `
          <section class="col">
            <div class="section-header">
              <h2 class="section-title"><span class="bar"></span>年度重点工作</h2>
              ${state.isEditMode ? '<button class="mini-icon" data-action="add-initiative" title="新增">＋</button>' : ''}
            </div>
            <div class="list initiative-list">
              ${state.data.initiatives.length ? state.data.initiatives.map((item, idx) => renderInitiativeBlock(item, idx + 1, analysis)).join('') : '<div class="empty">暂无重点工作，点击右上角“+”新增。</div>'}
            </div>
          </section>
          <div class="right-col">
            <section class="section-panel value-stream-panel">
              <div class="section-header">
                <h2 class="section-title"><span class="bar" style="background: var(--amber);"></span>LV2价值定位与目标</h2>
                ${state.isEditMode ? '<button class="mini-icon" data-action="add-value-stream" title="新增LV2价值定位与目标">＋</button>' : ''}
              </div>
              <div class="value-stream-row">
                ${state.data.valueStreams.length ? state.data.valueStreams.map(item => renderNode(item, 'valueStream', null, null, analysis)).join('') : '<div class="empty" style="min-width: 220px; width: 100%;">暂无LV2价值定位与目标，点击右上角“+”新增。</div>'}
              </div>
            </section>
            <section class="section-panel">
              <div class="section-header">
                <h2 class="section-title"><span class="bar slate"></span>业务能力</h2>
                <div class="section-header-tools">
                  <span class="section-summary">能力总数：${totalCapabilities}项</span>
                  ${state.isEditMode ? '<button class="mini-icon" data-action="add-group" title="新增">＋</button>' : ''}
                </div>
              </div>
              <div class="group-grid">
                ${state.data.capabilityGroups.length ? state.data.capabilityGroups.map(group => `
                  <div class="group-card node" id="node-${group.id}" data-node-id="${group.id}" data-node-type="capabilityGroup">
                    <div class="group-head" data-group-toggle="${group.id}">
                      <div class="group-name">${state.expandedGroups[group.id] !== false ? '▾' : '▸'} ${escapeHtml(group.title)}</div>
                      <div class="group-head-right">
                        <span class="group-meta">${group.capabilities.length}项能力</span>
                        ${state.isEditMode ? `
                          <div class="group-actions">
                            <button class="mini-icon" data-action="add-capability" data-group-id="${group.id}" title="新增能力">＋</button>
                            <button class="mini-icon" data-action="edit-group" data-group-id="${group.id}" title="编辑">✎</button>
                            <button class="mini-icon danger" data-action="delete-group" data-group-id="${group.id}" title="删除">🗑</button>
                          </div>` : ''}
                      </div>
                    </div>
                    ${state.expandedGroups[group.id] !== false ? `<div class="cap-list">${group.capabilities.length ? group.capabilities.map(cap => renderNode(cap, 'capability', group.id, null, analysis)).join('') : '<div class="empty">暂无业务能力</div>'}</div>` : ''}
                  </div>`).join('') : '<div class="empty">暂无业务能力组，点击右上角“+”新增。</div>'}
              </div>
            </section>
            <section class="section-panel">
              <div class="section-header">
                <h2 class="section-title"><span class="bar indigo"></span>IT产品 / 项目</h2>
                <div class="section-header-tools">
                  <span class="section-summary">汇总：${formatBudget(totalBudget)} 万元</span>
                  ${state.isEditMode ? '<button class="mini-icon" data-action="add-it" title="新增">＋</button>' : ''}
                </div>
              </div>
              <div class="it-grid">
                <div class="it-subsection">
                  <div class="subhead-row">
                    <h3 class="subhead">产品</h3>
                    <span class="sub-summary">${productItems.length}项 · ${formatBudget(productBudget)}万元</span>
                  </div>
                  <div class="it-card-grid products-grid">${productItems.length ? productItems.map(it => renderNode(it, 'itProject', null, null, analysis)).join('') : '<div class="empty" style="grid-column:1 / -1;">暂无产品</div>'}</div>
                </div>
                <div class="it-subsection">
                  <div class="subhead-row">
                    <h3 class="subhead">项目</h3>
                    <span class="sub-summary">${projectItems.length}项 · ${formatBudget(projectBudget)}万元</span>
                  </div>
                  <div class="it-card-grid projects-grid">${projectItems.length ? projectItems.map(it => renderNode(it, 'itProject', null, null, analysis)).join('') : '<div class="empty" style="grid-column:1 / -1;">暂无项目</div>'}</div>
                </div>
              </div>
            </section>
          </div>
        `;

        bindBoardEvents();
        renderNodeClasses();
      }

      function renderInitiativeBlock(item, index, analysis) {
        const expanded = state.expandedInitiatives[item.id] === true;
        const measures = item.keyMeasures || [];
        return `
          <div class="initiative-item">
            ${renderNode(item, 'initiative', null, formatChineseIndex(index), analysis)}
            ${expanded ? `
              <div class="initiative-measures">
                <div class="initiative-measures-head">
                  <button class="initiative-measures-toggle" data-action="toggle-measures" data-initiative-id="${item.id}" title="展开或收起关键举措">
                    <span>▾</span>
                    <span>关键举措</span>
                    <span class="initiative-measures-count">${measures.length}</span>
                  </button>
                  ${state.isEditMode ? `<button class="mini-icon" data-action="add-measure" data-group-id="${item.id}" title="新增关键举措">＋</button>` : ''}
                </div>
                <div class="initiative-measures-list">${measures.length ? measures.map(measure => renderNode(measure, 'keyMeasure', item.id, null, analysis)).join('') : '<div class="empty">暂无关键举措</div>'}</div>
              </div>` : ''}
          </div>`;
      }

      function renderNode(item, type, groupId, index, analysis) {
        let statusLabel = '', statusClass = 'status-slate';
        let showStatusTag = false;
        if (type === 'initiative' || type === 'keyMeasure') {
          showStatusTag = item.status === 'new';
          statusLabel = '新增';
          statusClass = 'status-green';
        } else if (type === 'capability' || type === 'valueStream') {
          showStatusTag = item.status === 'new';
          statusLabel = '新增';
          statusClass = 'status-green';
        } else {
          showStatusTag = item.status === 'new';
          statusLabel = '新增';
          statusClass = 'status-indigo';
        }

        let warning = '';
        if (type === 'itProject' && analysis.itOrphans.has(item.id)) warning = '<span class="warn-icon red" title="无重点工作支撑，可能为孤立投资">⚠</span>';
        if (type === 'capability' && analysis.capabilityGaps.has(item.id)) warning = '<span class="warn-icon orange" title="支撑了重点工作，但缺乏IT项目落地">⚠</span>';

        const desc = (type === 'initiative' || type === 'keyMeasure') && item.description ? `<div class="node-subtitle">${escapeHtml(item.description)}</div>` : '';
        const budgetRatio = type === 'itProject' ? getBudgetRatio(item) : null;
        const budgetText = type === 'itProject'
          ? `<div class="node-subtitle">预算：${formatBudget(item.budget)} 万元 · 占比：${formatPercent(budgetRatio)}</div>`
          : '';
        const anchors = state.isEditMode && type !== 'initiative' ? ALL_ANCHORS.map(side => `<button class="anchor anchor-${side} ${state.dragLink?.sourceId===item.id&&state.dragLink?.sourceAnchor===side?'source-anchor':''} ${state.dragLink?.targetId===item.id&&state.dragLink?.targetAnchor===side?'active-target':''}" data-anchor-side="${side}" data-node-anchor-id="${item.id}" title="${side}"></button>`).join('') : '';
        const statusTag = showStatusTag ? `<span class="status-pill ${statusClass}">${statusLabel}</span>` : '';
        const hoverDetail = type === 'capability'
          ? (item.gapDescription || '').trim()
          : type === 'itProject'
            ? (item.featurePlan || '').trim()
            : '';
        const hoverLabel = type === 'capability' ? '差距描述' : '特性规划';
        const hoverTitleAttr = (!state.isEditMode && hoverDetail)
          ? `title="${escapeAttr(`${hoverLabel}：${hoverDetail}`)}"`
          : '';
        const nodeClass = type === 'initiative'
          ? 'initiative-node'
          : type === 'keyMeasure'
            ? 'measure-node'
            : type === 'valueStream'
              ? 'value-stream-node'
              : type === 'capability'
                ? 'capability-node'
                : 'it-node';

        return `
          <div class="node ${nodeClass}"
               id="node-${item.id}"
               data-node-id="${item.id}"
               data-node-type="${type}"
               data-group-id="${groupId || ''}"
               ${hoverTitleAttr}>
            ${anchors}
            <div class="node-top">
              <div class="node-main">
                <div class="node-title-row">
                  ${type === 'initiative' ? `<span class="seq-tag">${index}</span>` : ''}
                  <div class="node-title">${escapeHtml(item.title)}</div>
                </div>
                ${desc}
                ${budgetText}
              </div>
              <div class="meta-row">
                ${statusTag}
                ${warning}
                ${state.isEditMode ? `
                  <div class="node-footer">
                    <button class="mini-icon" data-action="edit-node" data-node-type="${type}" data-node-id="${item.id}" data-group-id="${groupId || ''}" title="编辑">✎</button>
                    <button class="mini-icon danger" data-action="delete-node" data-node-type="${type}" data-node-id="${item.id}" data-group-id="${groupId || ''}" title="删除">🗑</button>
                  </div>` : ''}
              </div>
            </div>
          </div>`;
      }

      function bindBoardEvents() {
        els.board.querySelectorAll('[data-group-toggle]').forEach(el => {
          el.addEventListener('click', (e) => {
            if (e.target.closest('[data-action]')) return;
            toggleGroup(el.getAttribute('data-group-toggle'));
          });
        });

        els.board.querySelectorAll('[data-action="toggle-measures"]').forEach(el => {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleInitiativeMeasures(el.getAttribute('data-initiative-id'));
          });
        });

        els.board.querySelectorAll('[data-node-id]').forEach(node => {
          const nodeId = node.getAttribute('data-node-id');
          node.addEventListener('mouseenter', () => {
            state.hoveredNode = nodeId;
            renderNodeClasses();
            renderLines();
            renderInteractionLayer();
          });
          node.addEventListener('mouseleave', () => {
            if (state.hoveredNode === nodeId && !state.dragLink) state.hoveredNode = null;
            renderNodeClasses();
            renderLines();
            renderInteractionLayer();
          });
          node.addEventListener('click', (e) => {
            if (e.target.closest('[data-action]') || e.target.closest('[data-anchor-side]')) return;
            handleNodeClick(nodeId, node.getAttribute('data-node-type'));
          });
        });

        els.board.querySelectorAll('[data-anchor-side]').forEach(anchor => {
          anchor.addEventListener('pointerdown', (e) => {
            startAnchorDrag(anchor.getAttribute('data-node-anchor-id'), anchor.getAttribute('data-anchor-side'), e);
          });
          anchor.addEventListener('mouseenter', () => {
            const nodeId = anchor.getAttribute('data-node-anchor-id');
            state.hoveredNode = nodeId;
            renderNodeClasses();
          });
        });

        els.board.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const action = btn.getAttribute('data-action');
            const groupId = btn.getAttribute('data-group-id');
            const nodeId = btn.getAttribute('data-node-id');
            const nodeType = btn.getAttribute('data-node-type');
            if (action === 'add-initiative') openModal('initiative');
            if (action === 'add-measure') openModal('keyMeasure', null, groupId);
            if (action === 'add-value-stream') openModal('valueStream');
            if (action === 'add-group') openModal('capabilityGroup');
            if (action === 'add-capability') openModal('capability', null, groupId);
            if (action === 'add-it') openModal('itProject');
            if (action === 'edit-group') {
              const group = state.data.capabilityGroups.find(g => g.id === groupId);
              openModal('capabilityGroup', group);
            }
            if (action === 'delete-group') deleteItem('capabilityGroup', groupId);
            if (action === 'edit-node') {
              const item = findItem(nodeType, nodeId, groupId);
              openModal(nodeType, item, groupId || null);
            }
            if (action === 'delete-node') deleteItem(nodeType, nodeId, groupId || null);
          });
        });
      }

      function findItem(type, id, groupId) {
        if (type === 'initiative') return state.data.initiatives.find(i => i.id === id);
        if (type === 'keyMeasure') return state.data.initiatives.find(i => i.id === groupId)?.keyMeasures.find(m => m.id === id);
        if (type === 'valueStream') return state.data.valueStreams.find(v => v.id === id);
        if (type === 'capability') return state.data.capabilityGroups.find(g => g.id === groupId)?.capabilities.find(c => c.id === id);
        if (type === 'itProject') return state.data.itProjects.find(it => it.id === id);
        return null;
      }

      function render() {
        els.editBanner.style.display = state.isEditMode ? 'flex' : 'none';
        els.editModeBtn.classList.toggle('active', state.isEditMode);
        els.editModeBtn.querySelector('span').textContent = state.isEditMode ? '退出编辑' : '进入编辑';
        renderBoard();
        renderLines();
        renderInteractionLayer();
        renderLinkStatus();
        requestAnimationFrame(updatePositions);
      }

      els.editModeBtn.addEventListener('click', toggleEditMode);
      els.exportBtn.addEventListener('click', exportData);
      els.importBtn.addEventListener('click', () => els.importInput.click());
      els.importInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) importData(file);
        e.target.value = '';
      });
      els.closeModalBtn.addEventListener('click', closeModal);
      els.cancelModalBtn.addEventListener('click', closeModal);
      els.modalBackdrop.addEventListener('click', (e) => {
        if (e.target === els.modalBackdrop) closeModal();
      });
      els.canvasWrap.addEventListener('scroll', () => {
        renderLines();
        renderInteractionLayer();
      });
      window.addEventListener('resize', () => {
        renderLines();
        renderInteractionLayer();
      });
      document.addEventListener('click', (e) => {
        if (!state.isEditMode) return;
        if (!e.target.closest('[data-node-id]') && !e.target.closest('[data-link-id]')) {
          state.linkingSource = null;
          if (!state.dragLink) render();
        }
      });

      els.assistantFab.addEventListener('click', () => openAssistant());
      els.assistantCloseBtn.addEventListener('click', closeAssistant);
      els.assistantBackdrop.addEventListener('click', closeAssistant);
      els.assistantSettingsBtn.addEventListener('click', () => openAssistantSettings());
      els.assistantSettingsCloseBtn.addEventListener('click', closeAssistantSettings);
      els.assistantSettingsBackdrop.addEventListener('click', closeAssistantSettings);
      els.assistantSendBtn.addEventListener('click', sendAssistantMessage);
      els.assistantChatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendAssistantMessage();
        }
      });
      els.assistantTabs.querySelectorAll('[data-assistant-tab]').forEach(tabBtn => {
        tabBtn.addEventListener('click', () => {
          state.assistant.activeTab = tabBtn.getAttribute('data-assistant-tab') || 'api';
          renderAssistant();
        });
      });
      els.saveApiConfigBtn.addEventListener('click', () => {
        state.assistant.config = {
          provider: els.aiProviderInput.value.trim(),
          baseUrl: els.aiBaseUrlInput.value.trim(),
          apiKey: els.aiApiKeyInput.value.trim(),
          model: els.aiModelInput.value.trim(),
          temperature: Number.isFinite(Number(els.aiTempInput.value)) ? Number(els.aiTempInput.value) : 0.2,
        };
        saveAssistantState();
        alert('API配置已保存');
      });
      els.newPromptBtn.addEventListener('click', () => {
        const prompt = { id: generateId(), title: '新Prompt', content: '' };
        state.assistant.prompts.unshift(prompt);
        state.assistant.activePromptId = prompt.id;
        saveAssistantState();
        renderAssistant();
      });
      els.savePromptBtn.addEventListener('click', () => {
        const activePrompt = getActivePrompt();
        if (!activePrompt) return;
        const title = els.promptTitleInput.value.trim();
        if (!title) {
          alert('Prompt名称不能为空');
          return;
        }
        activePrompt.title = title;
        activePrompt.content = els.promptContentInput.value;
        saveAssistantState();
        renderAssistant();
      });
      els.deletePromptBtn.addEventListener('click', () => {
        if (!state.assistant.activePromptId) return;
        if (!confirm('确定删除当前Prompt吗？')) return;
        state.assistant.prompts = state.assistant.prompts.filter(p => p.id !== state.assistant.activePromptId);
        if (!state.assistant.prompts.length) {
          const seed = defaultPrompt();
          state.assistant.prompts = [seed];
          state.assistant.activePromptId = seed.id;
        } else {
          state.assistant.activePromptId = state.assistant.prompts[0].id;
        }
        saveAssistantState();
        renderAssistant();
      });
      els.pickOntologyBtn.addEventListener('click', () => els.ontologyInput.click());
      els.ontologyInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || '{}'));
            if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
              alert('本体JSON格式错误，应为对象结构');
              return;
            }
            state.assistant.ontology = parsed;
            state.assistant.ontologyFileName = file.name;
            saveAssistantState();
            renderAssistant();
          } catch (error) {
            alert('JSON解析失败');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      });
      els.clearOntologyBtn.addEventListener('click', () => {
        state.assistant.ontology = null;
        state.assistant.ontologyFileName = '';
        saveAssistantState();
        renderAssistant();
      });

      state.expandedGroups = buildExpandedGroups(state.data.capabilityGroups);
      state.expandedInitiatives = buildExpandedInitiatives(state.data.initiatives);
      loadAssistantState();
      renderAssistant();
      render();
    })();
  </script>
</body>
</html>
